<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>동글랜드 런처</title>
<link rel="icon" href="app_icon.png" />
<style>
/* ================= LOCAL FONTS (오프라인 번들, CDN 불필요) ================= */
@font-face{font-family:'Pretendard';font-weight:400;font-display:swap;src:url('fonts/Pretendard-Regular.woff2') format('woff2')}
@font-face{font-family:'Pretendard';font-weight:500;font-display:swap;src:url('fonts/Pretendard-Medium.woff2') format('woff2')}
@font-face{font-family:'Pretendard';font-weight:600;font-display:swap;src:url('fonts/Pretendard-SemiBold.woff2') format('woff2')}
@font-face{font-family:'Pretendard';font-weight:700;font-display:swap;src:url('fonts/Pretendard-Bold.woff2') format('woff2')}
@font-face{font-family:'Pixelify Sans';font-weight:400 700;font-display:swap;src:url('fonts/PixelifySans.woff2') format('woff2')}
/* ================= TOKENS ================= */
:root{
  /* 라틴 장식용은 픽셀폰트 유지, 한글은 Pretendard 로 폴백(굵고 선명) */
  --font-display:'Pixelify Sans','Pretendard',system-ui,sans-serif;
  --font-ui:'Pretendard','Rubik',system-ui,-apple-system,'Segoe UI',sans-serif;
  /* 'Space Mono' 는 영어 라벨이 튀어 보여 사용하지 않는다. 기본 UI 글꼴 + 숫자 정렬. */
  --font-mono:'Pretendard','Rubik',system-ui,-apple-system,'Segoe UI',sans-serif;
  --text-2xs:11px;--text-xs:12px;--text-sm:13px;--text-base:15px;--text-md:17px;
  --text-lg:20px;--text-xl:24px;--text-2xl:30px;--text-3xl:38px;--text-5xl:68px;
  --fw-semibold:600;--fw-bold:700;--fw-black:800;
  --ls-display:0.01em;--ls-tight:-0.01em;--ls-caps:0.14em;
  --lh-normal:1.45;--lh-relaxed:1.65;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;
  --r-xs:6px;--r-sm:10px;--r-md:14px;--r-lg:18px;--r-xl:24px;--r-2xl:30px;--r-pill:999px;
  --blur-sm:blur(10px) saturate(150%);--blur-md:blur(20px) saturate(170%);
  --blur-lg:blur(34px) saturate(185%);--blur-xl:blur(48px) saturate(190%);
  --shadow-sm:0 2px 8px rgba(0,0,0,.22);--shadow-md:0 8px 24px rgba(0,0,0,.30);
  --shadow-lg:0 18px 48px rgba(0,0,0,.40);
  --hit-min:44px;--control-h-sm:34px;--control-h:44px;--control-h-lg:54px;
  --sidebar-w:84px;--titlebar-h:40px;
  --ease-glass:cubic-bezier(.22,1,.36,1);--ease-pop:cubic-bezier(.34,1.56,.64,1);
  --dur-fast:120ms;--dur-base:200ms;--dur-slow:340ms;--dur-scene:1100ms;
  --grass-500:#6DBE45;

  /* DARK (night) — default */
  --scene-top:#0D1430;--scene-mid:#1C3A5E;--scene-bottom:#14251A;
  --scene-glow:rgba(214,226,255,.42);--scene-accent:rgba(58,214,214,.16);
  --glass-fill:rgba(16,22,34,.55);--glass-fill-strong:rgba(9,13,22,.70);
  --glass-fill-thin:rgba(34,44,62,.30);--glass-fill-bright:rgba(255,255,255,.07);
  --glass-edge:rgba(255,255,255,.18);--glass-edge-soft:rgba(255,255,255,.08);
  --glass-shade:rgba(0,0,0,.32);--specular:rgba(255,255,255,.42);
  --hover-veil:rgba(255,255,255,.13);
  --text-strong:rgba(255,255,255,.96);--text-body:rgba(255,255,255,.80);
  --text-muted:rgba(255,255,255,.56);--text-faint:rgba(255,255,255,.36);
  --tint-grass:rgba(109,190,69,.16);--tint-grass-edge:rgba(141,214,94,.55);--tint-grass-text:#C6EFA6;
  --tint-emerald:rgba(47,184,107,.16);--tint-emerald-edge:rgba(47,184,107,.55);--tint-emerald-text:#8FF0BC;
  --tint-lava:rgba(240,128,60,.18);--tint-lava-edge:rgba(244,193,60,.60);--tint-lava-text:#FFD97A;
  --tint-redstone:rgba(226,75,75,.16);--tint-redstone-edge:rgba(245,128,128,.55);--tint-redstone-text:#F7B0B0;
  --tint-amethyst:rgba(155,109,214,.20);--tint-amethyst-edge:rgba(155,109,214,.55);--tint-amethyst-text:#D3BCF2;
  --tint-diamond:rgba(58,214,214,.18);--tint-diamond-edge:rgba(58,214,214,.50);--tint-diamond-text:#A6F2F2;
  --focus-ring:rgba(141,214,94,.65);
  --unavail-fill:rgba(255,255,255,.05);
  --glass-inset:inset 0 1px 0 var(--specular),inset 0 0 0 1px var(--glass-edge-soft),inset 0 -1px 0 var(--glass-shade);
  --btn-bevel:var(--glass-inset),var(--shadow-sm);
  --btn-bevel-press:inset 0 2px 5px rgba(0,0,0,.20),inset 0 0 0 1px var(--glass-edge-soft);
}
.app[data-theme="light"]{
  --scene-top:#63B5F2;--scene-mid:#BFE6F7;--scene-bottom:#79C24E;
  --scene-glow:rgba(255,246,205,.75);--scene-accent:rgba(255,213,128,.28);
  --glass-fill:rgba(255,255,255,.42);--glass-fill-strong:rgba(255,255,255,.60);
  --glass-fill-thin:rgba(255,255,255,.26);--glass-fill-bright:rgba(255,255,255,.55);
  --glass-edge:rgba(255,255,255,.75);--glass-edge-soft:rgba(255,255,255,.42);
  --glass-shade:rgba(30,50,70,.10);--specular:rgba(255,255,255,.90);
  --hover-veil:rgba(255,255,255,.50);
  --text-strong:rgba(16,24,18,.95);--text-body:rgba(22,32,26,.78);
  --text-muted:rgba(24,36,28,.56);--text-faint:rgba(24,36,28,.40);
  --tint-grass:rgba(109,190,69,.30);--tint-grass-edge:rgba(78,154,46,.70);--tint-grass-text:#2E5A1C;
  --tint-emerald:rgba(47,184,107,.28);--tint-emerald-edge:rgba(30,140,80,.70);--tint-emerald-text:#145A34;
  --tint-lava:rgba(240,128,60,.30);--tint-lava-edge:rgba(201,151,30,.75);--tint-lava-text:#8A4A12;
  --tint-redstone:rgba(226,75,75,.26);--tint-redstone-edge:rgba(179,46,46,.70);--tint-redstone-text:#8A1E1E;
  --tint-amethyst:rgba(155,109,214,.28);--tint-amethyst-edge:rgba(120,70,180,.65);--tint-amethyst-text:#4A2680;
  --tint-diamond:rgba(58,214,214,.30);--tint-diamond-edge:rgba(30,155,155,.65);--tint-diamond-text:#0C5757;
  --unavail-fill:rgba(20,40,60,.06);
}

/* ================= BASE ================= */
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:#0d1430;font-family:var(--font-ui);font-weight:500;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
.app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;
  color:var(--text-body);font-size:var(--text-base);line-height:var(--lh-normal);
  background:
    radial-gradient(46% 40% at 78% 20%,var(--scene-glow) 0%,transparent 60%),
    radial-gradient(80% 90% at 80% 98%,var(--scene-accent) 0%,transparent 55%),
    linear-gradient(178deg,var(--scene-top) 0%,var(--scene-mid) 54%,var(--scene-bottom) 100%);
  transition:background-color var(--dur-scene) var(--ease-glass);}
h1,h2,h3,h4{margin:0;color:var(--text-strong);font-weight:var(--fw-bold);line-height:1.2}
p{margin:0}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:999px;border:2px solid transparent;background-clip:content-box}
.app[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(30,50,70,.20);background-clip:content-box}
.ic{display:inline-block;vertical-align:middle;flex:0 0 auto}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

/* ================= SCENE BACKDROP ================= */
.scene-backdrop{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.stars{position:absolute;inset:0;opacity:1;transition:opacity var(--dur-scene) var(--ease-glass);
  background-image:
    radial-gradient(1.5px 1.5px at 12% 22%,rgba(255,255,255,.9),transparent),
    radial-gradient(1.5px 1.5px at 28% 12%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 45% 30%,rgba(255,255,255,.8),transparent),
    radial-gradient(1.5px 1.5px at 62% 16%,rgba(255,255,255,.7),transparent),
    radial-gradient(1px 1px at 8% 42%,rgba(255,255,255,.6),transparent),
    radial-gradient(1.5px 1.5px at 52% 8%,rgba(255,255,255,.85),transparent),
    radial-gradient(1px 1px at 88% 34%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 35% 46%,rgba(255,255,255,.55),transparent);}
.app[data-theme="light"] .stars{opacity:0}
.sun,.moon{position:absolute;top:-4%;right:6%;width:88px;height:88px;border-radius:50%;
  transition:transform var(--dur-scene) var(--ease-glass),opacity var(--dur-scene) var(--ease-glass)}
.sun{transform:translateY(140px);opacity:0;filter:blur(2px);
  background:radial-gradient(circle at 50% 50%,rgba(255,246,205,.95) 0%,rgba(255,215,114,.55) 36%,rgba(249,178,51,0) 70%);
  box-shadow:0 0 130px 60px rgba(255,214,120,.30)}
.moon{transform:translateY(0);opacity:.85;filter:blur(1px);
  background:radial-gradient(circle at 42% 40%,rgba(251,253,255,.95) 0%,rgba(220,230,245,.6) 52%,rgba(174,187,212,0) 78%);
  box-shadow:0 0 110px 40px rgba(214,226,255,.22)}
.app[data-theme="light"] .sun{transform:translateY(0);opacity:.9}
.app[data-theme="light"] .moon{transform:translateY(-140px);opacity:0}

/* ================= TITLE BAR ================= */
.titlebar{display:flex;align-items:center;justify-content:space-between;height:var(--titlebar-h);
  padding-left:14px;background:var(--glass-fill-strong);backdrop-filter:var(--blur-lg);-webkit-backdrop-filter:var(--blur-lg);
  border-bottom:1px solid var(--glass-edge-soft);box-shadow:inset 0 1px 0 var(--specular);user-select:none}
.titlebar .tb-title{display:flex;align-items:center;gap:9px}
.titlebar .tb-title span{font-family:var(--font-display);font-weight:600;font-size:var(--text-sm);color:var(--text-body);letter-spacing:var(--ls-display)}
.wc{width:46px;height:var(--titlebar-h);display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;transition:background var(--dur-fast),color var(--dur-fast)}
.wc:hover{background:var(--hover-veil)}
.wc[data-kind="close"]:hover{background:#E24B4B;color:#fff}
.logo{width:16px;height:16px;border-radius:5px;background:var(--glass-fill-bright);border:1px solid var(--glass-edge);
  box-shadow:var(--glass-inset);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--text-strong);font-size:9px}
.logo.lg{width:30px;height:30px;border-radius:8px;font-size:15px;backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm)}
/* 아이콘 이미지가 든 로고는 글래스 박스(배경/테두리/그림자/블러) 제거 */
.logo:has(img){background:none;border:none;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}

/* ================= LAYOUT ================= */
.body-row{flex:1;min-height:0;display:flex;position:relative;z-index:1}
.sidebar{display:flex;flex-direction:column;align-items:stretch;width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
  padding:14px 10px;gap:6px;background:var(--glass-fill-strong);backdrop-filter:var(--blur-lg);-webkit-backdrop-filter:var(--blur-lg);
  border-right:1px solid var(--glass-edge-soft);box-shadow:inset -1px 0 0 var(--glass-shade),var(--shadow-lg)}
.sidebar .brand{display:flex;justify-content:center;padding:6px 0 14px}
.sidebar .nav-list{display:flex;flex-direction:column;gap:6px;flex:1}
.sidebar .foot{padding-top:10px;margin-top:6px;border-top:1px solid var(--glass-edge-soft)}
.navitem{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  width:100%;min-height:64px;padding:10px 6px;border:none;border-radius:var(--r-lg);background:transparent;
  color:var(--text-muted);cursor:pointer;transition:background var(--dur-base) var(--ease-glass),color var(--dur-base),transform var(--dur-fast);-webkit-tap-highlight-color:transparent}
.navitem:hover{background:var(--hover-veil);color:var(--text-strong)}
.navitem:active{transform:scale(.96)}
.navitem[data-active="true"]{background:var(--glass-fill-bright);color:var(--text-strong);box-shadow:var(--glass-inset)}
.navitem[data-active="true"] .spine{position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:4px;height:26px;border-radius:999px;background:var(--grass-500);box-shadow:0 0 12px var(--grass-500)}
.navitem .label{font-size:var(--text-2xs);font-weight:var(--fw-semibold)}
.navitem .dot{position:absolute;top:-6px;right:-8px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:#F0803C;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.navicon{position:relative;display:inline-flex}

main{flex:1;min-width:0;min-height:0;position:relative;display:flex;flex-direction:column}
.catbar{display:flex;align-items:center;gap:12px;padding:10px 24px;flex:0 0 auto;z-index:2;
  background:var(--glass-fill-strong);backdrop-filter:var(--blur-lg);-webkit-backdrop-filter:var(--blur-lg);border-bottom:1px solid var(--glass-edge-soft)}
.tabs{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:4px}
.tab{display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 16px;border:1px solid transparent;border-radius:var(--r-pill);
  white-space:nowrap;cursor:pointer;font-size:var(--text-sm);font-weight:600;color:var(--text-muted);background:transparent;transition:color var(--dur-base),background var(--dur-base)}
.tab:hover{color:var(--text-strong);background:var(--hover-veil)}
.tab[data-active="true"]{color:var(--text-strong);background:var(--glass-fill-bright);border-color:var(--glass-edge);box-shadow:var(--glass-inset);backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm)}
.tab .cnt{font-family:var(--font-mono);font-size:11px;opacity:.55}
.screen-holder{flex:1;min-height:0;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto}

/* screen + grid transitions */
@keyframes screen-up{from{opacity:0;transform:translateY(64px)}to{opacity:1;transform:translateY(0)}}
.pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#6dbe45;margin-right:8px;animation:pulse-dot 1.4s ease-in-out infinite;vertical-align:middle}
/* 할당 메모리 슬라이더 */
.mem-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mem-val{font-family:var(--font-mono,monospace);font-size:var(--text-2xl,26px);font-weight:700;color:var(--text-strong)}
.mem-slider-wrap{margin-bottom:14px}
.mem-range{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:999px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,var(--grass-500) var(--fill,50%),var(--glass-fill-thin) var(--fill,50%))}
.mem-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
  background:#fff;border:3px solid var(--grass-500);cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.mem-range::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.08)}
.mem-range::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--grass-500);cursor:grab}
.mem-scale{display:flex;justify-content:space-between;margin-top:6px;font-size:var(--text-2xs);color:var(--text-faint);font-family:var(--font-mono,monospace)}
.mem-chips{display:flex;gap:8px;flex-wrap:wrap}
.mem-chip{padding:7px 13px;border-radius:999px;border:1px solid var(--glass-edge);background:var(--glass-fill-thin);
  color:var(--text-body);font-size:var(--text-xs);font-weight:600;cursor:pointer;transition:background .15s,border-color .15s}
.mem-chip:hover{background:var(--hover-veil)}
.mem-chip[data-active="true"]{border-color:var(--tint-grass-edge);background:var(--tint-grass);color:var(--tint-grass-text)}
.mem-rec{font-size:var(--text-2xs);color:var(--text-faint);font-weight:500;margin-left:2px}
.mem-warn{display:flex;align-items:center;gap:7px;margin-top:14px;padding:10px 12px;border-radius:var(--r-md);
  border:1px solid var(--tint-lava-edge,rgba(224,110,60,.5));background:var(--tint-lava,rgba(224,110,60,.14));
  color:var(--tint-lava-text,#ffb995);font-size:var(--text-xs)}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes screen-down{from{opacity:0;transform:translateY(-64px)}to{opacity:1;transform:translateY(0)}}
@keyframes grid-in{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:translateX(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.anim-up{animation:screen-up var(--dur-slow) var(--ease-glass)}
.anim-down{animation:screen-down var(--dur-slow) var(--ease-glass)}
.anim-grid{animation:grid-in var(--dur-base) var(--ease-glass)}
.meta-fill{animation:fade var(--dur-base) var(--ease-glass)}
.theme-choice .tc-dot{opacity:0;transition:opacity var(--dur-base) var(--ease-glass)}
.theme-choice[data-active="true"] .tc-dot{opacity:1}
@media (prefers-reduced-motion:reduce){.anim-up,.anim-down,.anim-grid,.sun,.moon,.stars{animation:none!important;transition:none!important}}

/* ================= GLASS / COMPONENTS ================= */
.glass{background:var(--glass-fill);backdrop-filter:var(--blur-md);-webkit-backdrop-filter:var(--blur-md);border-radius:var(--r-xl);box-shadow:var(--glass-inset),var(--shadow-lg)}
.tile{background:var(--glass-fill-thin);backdrop-filter:var(--blur-md);-webkit-backdrop-filter:var(--blur-md);border-radius:var(--r-lg);box-shadow:var(--glass-inset),var(--shadow-md)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;flex:0 0 auto;height:var(--control-h);min-height:var(--hit-min);
  padding:0 20px;font-weight:700;font-size:var(--text-base);letter-spacing:var(--ls-tight);border-radius:var(--r-md);
  border:1px solid var(--glass-edge);cursor:pointer;color:var(--text-strong);background:var(--glass-fill-bright);
  backdrop-filter:var(--blur-md);-webkit-backdrop-filter:var(--blur-md);box-shadow:var(--btn-bevel);
  transition:transform var(--dur-fast) var(--ease-pop),box-shadow var(--dur-fast),background-image var(--dur-base);-webkit-tap-highlight-color:transparent}
.btn:hover{background-image:linear-gradient(var(--hover-veil),var(--hover-veil))}
.btn:active{transform:translateY(1px);box-shadow:var(--btn-bevel-press)}
.btn:focus-visible{outline:none;box-shadow:var(--btn-bevel),0 0 0 3px var(--focus-ring)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn--ghost{background:transparent;border-color:transparent;color:var(--text-body)}
.btn--primary{background:var(--tint-grass);border-color:var(--tint-grass-edge);color:var(--tint-grass-text)}
.btn--danger{background:var(--tint-redstone);border-color:var(--tint-redstone-edge);color:var(--tint-redstone-text)}
.btn--sm{height:var(--control-h-sm);min-height:var(--control-h-sm);padding:0 14px;font-size:var(--text-sm);gap:6px}
.btn--lg{height:var(--control-h-lg);padding:0 28px;font-size:var(--text-md);gap:10px}

.install{display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;flex:0 0 auto;height:var(--control-h);min-height:var(--hit-min);
  padding:0 22px;font-weight:700;font-size:var(--text-base);letter-spacing:var(--ls-tight);border-radius:var(--r-md);cursor:pointer;
  backdrop-filter:var(--blur-md);-webkit-backdrop-filter:var(--blur-md);box-shadow:var(--btn-bevel);
  transition:transform var(--dur-fast) var(--ease-pop),box-shadow var(--dur-base),background-image var(--dur-base);-webkit-tap-highlight-color:transparent}
.install:not(:disabled):hover{background-image:linear-gradient(var(--hover-veil),var(--hover-veil))}
.install:not(:disabled):active{transform:translateY(1px);box-shadow:var(--btn-bevel-press)}
.install--sm{height:38px;min-height:38px;padding:0 16px;font-size:var(--text-sm)}
.install[data-state="install"]{background:var(--tint-grass);border:1px solid var(--tint-grass-edge);color:var(--tint-grass-text)}
.install[data-state="installed"]{background:var(--tint-emerald);border:1px solid var(--tint-emerald-edge);color:var(--tint-emerald-text)}
.install[data-state="update"],.btn--update{background:var(--tint-lava);border:1px solid var(--tint-lava-edge);color:var(--tint-lava-text);animation:attention 2.6s var(--ease-glass) infinite}

<script>
  window.__hasSkinView = false;
  let __skinViewLoading = null;
  /* skinview3d 를 한 번만 지연 로드. 반환: Promise<boolean> (사용 가능 여부) */
  function ensureSkinView(){
    if(window.__hasSkinView) return Promise.resolve(true);
    if(__skinViewLoading) return __skinViewLoading;
    __skinViewLoading = new Promise(resolve=>{
      const s=document.createElement("script");
      s.src="./vendor/skinview3d/skinview3d.bundle.js";
      s.async=true;
      s.onload=()=>{
        window.__hasSkinView = !!(window.skinview3d && window.skinview3d.SkinViewer);
        resolve(window.__hasSkinView);
      };
      s.onerror=()=>{ __skinViewLoading=null; resolve(false); };
      document.head.appendChild(s);
    });
    return __skinViewLoading;
  }
</script>

function verBtnLabel(id){
  if(id==="java"){
    const st=(state.javaStatus||{}).status;
    if(st==="needed") return "Java 설치";
    if(st==="managed") return "재설치";
  }
  if(id==="fabric"){
    if(state.fabricUpdating) return "업데이트 중…";
    /* Fabric 로더 버전이 실제 값이면 게임은 설치된 상태다.
       (client 상태만 보면 아직 갱신 전이라 '게임 설치 필요'로 잘못 뜬다) */
    const fab=DATA.system.find(r=>r.id==="fabric");
    const hasLoader = fab && !_VER_PLACEHOLDER.includes(fab.current);
    if(hasLoader || (state.client && state.client.installed)) return "업데이트";
    return "게임 설치 필요";
  }
  return "업데이트";
}

function ic(name,size){size=size||20;const p=ICONS[name]||"";return '<svg class="ic" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
/* 이미지 URL 있으면 cover 배경, 없으면 그라디언트 폴백 */
function bgFor(url, grad){
  if(url){ return "background:#131a38 center/cover no-repeat url('"+String(url).replace(/'/g,"%27").replace(/"/g,"%22")+"')"; }
  return "background:"+grad;
}

    +'<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px;flex-wrap:wrap">'

function verFor(t){let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))&0xffff;return "v"+(h%3)+"."+((h>>3)%20)+"."+((h>>6)%30);}
function renderModal(){

  const compat=s!=="unavailable";
  const metacell=(icn,label,val,tone,key)=>{const col=tone==="emerald"?"var(--tint-emerald-text)":tone==="redstone"?"var(--tint-redstone-text)":"var(--text-strong)";
    return '<div class="metacell"><div class="k">'+ic(icn,13)+label+'</div><div class="v"'+(key?' data-meta="'+key+'"':'')+' style="color:'+col+';'+(tone==="mono"?"font-family:var(--font-mono)":"")+'">'+esc(val)+'</div></div>';};
  root.innerHTML='<div class="overlay" data-close-modal="1"><div class="modal" data-stop="1">'

      +'<div class="arttitle"><div class="badge-row" style="margin-bottom:8px">'+badgesHTML(m.badges)+'</div><h2>'+esc(m.title)+'</h2></div></div>'
    +'<div class="mbody">'

        +metacell(compat?"shield-check":"shield-alert","호환성",compat?"호환됨":"호환 안 됨",compat?"emerald":"redstone")
      +'</div>'
      +'<div style="display:flex;gap:18px;font-size:var(--text-xs);color:var(--text-muted);flex-wrap:wrap" class="mono">'
        +'<span>'+ic("download",13)+' '+esc(m.downloads)+'</span>'
        +'<span>'+ic("box",13)+' '+(kind==="shaders"?"셰이더팩":"모드")+'</span>'
        +(m.author?'<span data-meta="author">'+ic("user",13)+' '+esc(m.author)+'</span>':'')
      +'</div>'
      +'<div><div class="eyebrow" style="margin-bottom:6px">설명</div><p style="font-size:var(--text-base);color:var(--text-body);line-height:var(--lh-relaxed)">'+esc(m.blurb||"")+'</p></div>'
    +'</div>'
    +'<div class="mfoot">'+(m._bundled?'<span></span>':'<button class="btn btn--ghost" data-project="'+esc(m.id||"")+'" data-pkind="'+(kind==="shaders"?"shader":"mod")+'">'+ic("external-link",18)+'프로젝트</button>')+'<div id="modal-action" style="display:flex;gap:10px">'+modalActionHTML(m)+'</div></div>'

/* 모달 액션 버튼(들)만 만드는 함수 — 설치/제거/업데이트 시 이 영역만 제자리
   갱신해 모달 전체 재렌더(사진 재로딩=껌벅임)를 피한다. busy/진행률 반영. */
/* 설치된 버전 텍스트. 미설치면 '—', 구버전이면 뒤에 표식을 붙인다. */
function installedVerText(m){
  const st=stOf(m);
  if(st!=="installed" && st!=="update") return "—";
  const v=m._installedVersion;
  if(!v) return "설치됨";
  return (st==="update") ? (v+" (구버전)") : v;
}

function modalActionHTML(m){
  const s = m._busy ? "busy" : stOf(m);
  const pct = state.progress[m.id];
  const idAttr = ' data-install="'+esc(m.title)+'" data-id="'+esc(m.id||"")+'"';
  if(s==="busy"){
    const busyLabel=(typeof pct==="number")?(pct+"%"):"처리 중…";
    return '<button class="install" data-state="busy" disabled'+idAttr+'><span aria-hidden="true">…</span>'+busyLabel+'</button>';
  }
  /* 버전 선택(⋯)은 '항상' 주 버튼 바로 왼쪽에 붙는다.
       미설치:  [⋯][설치]
       설치됨:  [제거][⋯][설치됨]
       업데이트:[제거][⋯][업데이트]
     → 제거 버튼이 생기면 ⋯ 는 자연스럽게 옆으로 밀리고, 제거하면 되돌아온다.
     번들 모드는 Modrinth 버전이 없어 선택 불가. */
  const canVer = !m._bundled && s!=="unavailable";
  const verBtn = canVer
    ? '<div class="ver-anchor">'
      +'<button class="btn btn--ghost" data-ver="menu" data-id="'+esc(m.id||"")+'" title="버전 선택">'+ic("git-branch",15)+'버전 선택</button>'
      +'<div class="ver-menu-holder" id="vermenu-'+esc(m.id||"")+'">'+(state.verMenu===m.id?verMenuHTML(m):'')+'</div>'
      +'</div>'
    : '';
  /* 제거는 명시적 액션으로 분리한다. data-install 을 쓰면 doInstall 이 상태로
     분기하므로, update 상태에서 제거 버튼이 '업데이트'를 실행해버린다. */
  const removeBtn = '<button class="btn btn--danger" data-modrm="'+esc(m.title)+'">'+ic("trash-2",18)+'제거</button>';

  if(s==="installed"){
    return removeBtn + verBtn
      +'<button class="btn" disabled>'+ic("check",18)+'설치됨</button>';
  }
  if(s==="update"){
    // 업데이트가 필요해도 제거는 가능해야 한다 (기존엔 제거 버튼이 사라졌음)
    return removeBtn + verBtn
      +'<button class="install" data-state="update"'+idAttr+'>'+ic("arrow-up-circle",15)+'업데이트</button>';
  }
  const glyph={install:"⤓",unavailable:"⃠"}[s];
  const actLabel={install:"설치",unavailable:"호환 안 됨"}[s];
  return verBtn
    +'<button class="install" data-state="'+s+'" '+(s==="unavailable"?"disabled":"")+idAttr+'><span aria-hidden="true">'+glyph+'</span>'+actLabel+'</button>';
}
/* ── 버전 선택 메뉴 (이전 버전으로 되돌리기) ──────────────────────────
   모달 하단에 있으므로 위로 열린다. 스킨 ⋯ 메뉴와 같은 시각 언어. */
function verMenuHTML(m){
  const list=state.verList[m.id];
  if(!list) return '<div class="ver-menu"><div class="ver-menu-empty">불러오는 중…</div></div>';
  if(list.error) return '<div class="ver-menu"><div class="ver-menu-empty">'+esc(list.error)+'</div></div>';
  if(!list.versions || !list.versions.length) return '<div class="ver-menu"><div class="ver-menu-empty">설치 가능한 버전이 없습니다</div></div>';
  const rows=list.versions.map(v=>{
    const cur=v.is_current;
    const chan=v.version_type!=="release"?'<span class="ver-chan">'+esc(v.version_type)+'</span>':'';
    return '<button class="ver-menu-item'+(cur?' ver-menu-item--cur':'')+'" data-ver="pick" '
      +'data-id="'+esc(m.id||"")+'" data-vid="'+esc(v.id)+'"'+(cur?' disabled':'')+'>'
      +'<span class="ver-num">'+esc(v.version_number)+'</span>'
      +'<span class="ver-meta">'
        +'<span class="ver-date">'+(cur?'사용 중':esc(v.date))+'</span>'
        +chan
      +'</span></button>';
  }).join("");
  return '<div class="ver-menu"><div class="ver-menu-head">버전 선택</div>'+rows+'</div>';
}
async function toggleVerMenu(id){
  if(state.verMenu===id){ state.verMenu=null; refreshModalActionById(id); return; }
  state.verMenu=id;
  refreshModalActionById(id);                 // "불러오는 중…" 즉시 표시
  if(!state.verList[id]){
    const m=findModById(id); if(!m) return;
    const kind=(m._kind==="shader")?"shader":"mod";
    try{
      const r=await V3().list_versions(id, kind);
      state.verList[id]= (r&&r.ok) ? {versions:r.versions} : {error:(r&&r.message)||"버전 목록 실패"};
    }catch(e){ state.verList[id]={error:"버전 목록 오류"}; }
    if(state.verMenu===id) refreshModalActionById(id);
  }
  placeVerMenu(id);
}
/* ⋯ 버튼 위쪽 공간이 부족하면 메뉴를 아래로 연다 (모달 밖으로 새지 않게) */
function placeVerMenu(id){
  requestAnimationFrame(()=>{
    const holder=document.getElementById("vermenu-"+id);
    const menu=holder && holder.querySelector(".ver-menu");
    const btn=document.querySelector('[data-ver="menu"][data-id="'+id+'"]');
    if(!menu||!btn) return;
    const r=btn.getBoundingClientRect();
    const need=Math.min(menu.scrollHeight||240, 240)+16;
    menu.setAttribute("data-place", r.top < need ? "down" : "up");
  });
}
function findModById(id){ return DATA.mods.concat(DATA.shaders).find(m=>m.id===id); }
function refreshModalActionById(id){
  const m=findModById(id); if(m) refreshModalAction(m);
}
async function pickVersion(id, versionId){
  const m=findModById(id); if(!m||state.verBusy) return;
  state.verMenu=null; state.verBusy=true;
  m._busy=true; refreshModalAction(m);
  const kind=(m._kind==="shader")?"shader":"mod";
  try{
    const r=await V3().install_version(id, versionId, kind);
    if(r&&r.ok){
      delete state.verList[id];               // 목록 캐시 무효화(현재 버전 갱신)
      /* 구버전으로 되돌렸다면 최신이 아니므로 '업데이트' 상태가 되어야 한다.
         백엔드가 sha1 비교로 판정한 값을 그대로 쓴다. */
      m.state = (r.status==="update") ? "update" : "installed";
      if(r.version) m._installedVersion=r.version;
      if(m._kind==="shader" && r.filename) m._filename=r.filename;
      if(r.latest) m._latest=r.latest;
      const dn=(r.deps||[]).length;
      const depMsg = dn? " (필수 모드 "+dn+"개 함께 설치)" : "";
      flash("버전 "+(r.version||"")+" (으)로 변경했습니다"+depMsg);
    }else{
      flash((r&&r.message)||"버전 변경에 실패했습니다");
    }
  }catch(e){ flash("버전 변경 오류: "+e); }
  m._busy=false; state.verBusy=false;
  refreshModalAction(m);
  /* renderScreen() 은 화면을 통째로 다시 그려 스크롤이 맨 위로 올라간다.
     해당 카드만 제자리 갱신한다. */
  refreshItemInPlace(m, m._kind==="shader" ? "shaders" : "mods");
  renderSidebar();
}
function refreshModalAction(m){
  const el=document.getElementById("modal-action");
  if(el) el.innerHTML=modalActionHTML(m);
  /* 설치/제거/롤백 직후 '설치된 버전'이 바로 바뀌어야 한다.
     (예전엔 모달을 닫았다 열어야 갱신됐다) */
  const root=document.getElementById("modal-root");
  if(!root) return;
  const setMeta=(key,val)=>{
    const v=root.querySelector('[data-meta="'+key+'"]');
    if(!v||!val||v.textContent===val) return;
    v.textContent=val;
    v.classList.remove("meta-fill"); void v.offsetWidth; v.classList.add("meta-fill");
  };
  setMeta("installed-version", installedVerText(m));
  if(m._latest) setMeta("version", m._latest);
}

function renderCatbar(){

  if(state.nav!=="mods"&&state.nav!=="shaders"){holder.innerHTML="";return;}
  const cats=state.nav==="shaders"?DATA.shaderCategories:DATA.categories;
  holder.innerHTML='<div class="catbar"><div class="tabs">'+cats.map(c=>

}

/* 탭 전환 애니메이션이 끝난 뒤에 다시 그린다.

/* ── 현재 스킨 3D 뷰어 (skinview3d) — 스킨 탭 진입 시 생성, 이탈 시 정리 ── */
let __skinViewer=null, __skinViewerKey=null;
function disposeSkin3D(){
  if(__skinViewer){ try{__skinViewer.dispose();}catch(_){}} __skinViewer=null; __skinViewerKey=null;
}
function syncSkin3D(){
  const canvas=document.getElementById("skin3d-current");
  if(state.nav!=="skin" || !canvas){ disposeSkin3D(); return; }
  const SV=window.skinview3d;
  if(!SV || !SV.SkinViewer){
    // 아직 안 받았으면 지금 받아서 다시 시도 (실패 시 폴백 이미지)
    ensureSkinView().then(okv=>{
      if(okv && state.nav==="skin") syncSkin3D();
      else{
        const fb=document.getElementById("skin3d-fallback"); if(fb)fb.style.display="block";
        const c=document.getElementById("skin3d-current"); if(c)c.style.display="none";
      }
    });
    return;
  }
  const variant=(state.skin&&state.skin.variant)||"classic";  // classic|slim
  const key=skinTextureURL()+"|"+variant;
  if(__skinViewer && __skinViewerKey===key && __skinViewer.__canvas===canvas) return;
  disposeSkin3D();
  try{
    const viewer=new SV.SkinViewer({
      canvas, width:200, height:280,
      skin:skinTextureURL(),
      model:(variant==="slim"?"slim":"default"),  // skinview3d: default=와이드
    });
    viewer.zoom=0.9;
    viewer.fov=45;
    viewer.autoRotate=false;                       // 드래그로만 회전 (요청)
    viewer.controls.enableZoom=false;
    viewer.playerObject.rotation.y=0.55;           // 라이브러리(-0.55)와 반대 방향 대각선
    viewer.__canvas=canvas;
    __skinViewer=viewer; __skinViewerKey=key;
  }catch(e){ console.error("스킨 뷰어 생성 실패",e); disposeSkin3D();
    const fb=document.getElementById("skin3d-fallback"); if(fb)fb.style.display="block"; canvas.style.display="none";
  }
}
/* ── 라이브러리 카드 3D 썸네일 (skinview3d 로 한 장씩 구워 이미지로) ── */
const __thumbCache={};
function skinThumbHTML(it){
  const key=(it.data_url||"")+"|"+(it.variant||"classic");
  const cached=__thumbCache[key];
  if(cached) return '<img src="'+cached+'" alt="" style="width:150px;height:150px;object-fit:contain"/>';
  requestSkinThumb(it, key);
  return '<div class="skin-thumb-ph" data-thumbkey="'+key+'" style="width:150px;height:150px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:var(--text-2xs)">렌더링…</div>';
}
let __thumbQueue=[], __thumbBusy=false, __thumbViewer=null, __thumbCanvas=null;
function requestSkinThumb(it, key){
  if(__thumbCache[key]) return;
  if(__thumbQueue.some(q=>q.key===key)) return;
  __thumbQueue.push({it,key});
  drainThumbQueue();
}
async function drainThumbQueue(){
  if(__thumbBusy) return;
  let SV=window.skinview3d;
  if(!SV || !SV.SkinViewer){
    const okv = await ensureSkinView();   // 라이브러리 지연 로드
    if(!okv) return;
    SV = window.skinview3d;
  }
  __thumbBusy=true;
  // 썸네일 전용 오프스크린 뷰어 1개 재사용 (WebGL 컨텍스트 절약)
  if(!__thumbViewer){
    __thumbCanvas=document.createElement("canvas");
    __thumbViewer=new SV.SkinViewer({canvas:__thumbCanvas,width:220,height:220});
    __thumbViewer.autoRotate=false; __thumbViewer.zoom=0.9; __thumbViewer.fov=45;
    __thumbViewer.playerObject.rotation.y=-0.55;  // 약간 대각선(3/4) 뷰
    __thumbViewer.animation=null;
  }
  while(__thumbQueue.length){
    const {it,key}=__thumbQueue.shift();
    if(__thumbCache[key]) continue;
    try{
      const url=it.data_url||skinTextureURL();
      await __thumbViewer.loadSkin(url,{model:(it.variant==="slim"?"slim":"default")});
      __thumbViewer.render();
      const dataURL=__thumbCanvas.toDataURL("image/png");
      __thumbCache[key]=dataURL;
      document.querySelectorAll('.skin-thumb-ph[data-thumbkey="'+cssEsc(key)+'"]').forEach(ph=>{
        ph.innerHTML='<img src="'+dataURL+'" alt="" style="width:150px;height:150px;object-fit:contain"/>';
        ph.classList.remove("skin-thumb-ph");
      });
    }catch(e){ console.error("썸네일 렌더 실패",e); }
  }
  __thumbBusy=false;
}
function cssEsc(s){ return String(s).replace(/["\\\]]/g,"\\$&"); }

  renderSidebar();renderCatbar();renderScreen(false);renderModal();

/* 특정 항목만 제자리 갱신 — 전체 재렌더 없이 해당 카드/행만 교체.
   설치·삭제 시 화면 껌벅임과 스크롤 튐을 방지한다. */
function refreshItemInPlace(m, kind){
  const sel='[data-open="'+String(m.title).replace(/"/g,'\\"')+'"]';
  // 브라우즈 그리드 카드
  document.querySelectorAll('.modcard'+sel).forEach(function(el){
    const w=document.createElement('div'); w.innerHTML=modCardHTML(m,kind);
    if(w.firstElementChild) el.replaceWith(w.firstElementChild);
  });
  // 라이브러리 행 (제거되면 사라지고, 아니면 갱신)
  document.querySelectorAll('.librow'+sel).forEach(function(el){
    const s=stOf(m);
    if(s==="install"){ el.remove(); }   // 라이브러리에서 제거됨
    else { const w=document.createElement('div'); w.innerHTML=libRowHTML(m,kind);
           if(w.firstElementChild) el.replaceWith(w.firstElementChild); }
  });
}

/* 모달의 명시적 제거 액션 (상태와 무관하게 항상 제거) */
async function doRemove(title){
  const m=findMod(title); if(!m||m._busy) return;
  const isShader = m._kind==="shader";
  if(!Bridge.live){ state.installs[title]="install"; m.state="install"; m._installedVersion=null;
    flash("제거됨: "+title);
    refreshItemInPlace(m, isShader?"shaders":"mods"); renderSidebar();
    if(state.detail) refreshModalAction(m); return; }
  m._busy=true; refreshModalAction(m); refreshItemInPlace(m, isShader?"shaders":"mods");
  try{
    const res = isShader ? await V3().remove_shader(m.id) : await V3().remove_mod(m.id);
    if(res && res.ok){
      m.state="install"; m._version=null; if(isShader)m._filename=null;
      delete state.verList[m.id];
      flash("제거됨: "+title);
    }else handleModError(res);
  }catch(e){ flash("제거 오류: "+e); }
  m._busy=false;
  refreshModalAction(m); refreshItemInPlace(m, isShader?"shaders":"mods"); renderSidebar();
}

async function doInstall(title){
  const m=findMod(title);if(!m)return;const s=stOf(m);
  if(s==="unavailable"||m._busy)return;
  const kind = m._kind==="shader" ? "shaders" : "mods";

  // ── 브라우저 폴백(pywebview 없음): 로컬 토글 + 제자리 갱신 ──
  if(!Bridge.live){
    if(s==="install"){state.installs[title]="installed";flash("설치됨: "+title);}
    else if(s==="update"){state.installs[title]="installed";flash("업데이트됨: "+title);}
    else if(s==="installed"){state.installs[title]="install";flash("제거됨: "+title);}
    refreshItemInPlace(m,kind);
    renderSidebar();
    if(state.detail){ refreshModalAction(m); }
    return;
  }

  // ── pywebview 실경로: 백엔드 호출 (전체 재렌더 없이 해당 카드만 갱신) ──
  m._busy=true; state.progress[m.id]=0;   // 처음부터 0% 표시
  refreshItemInPlace(m,kind); if(state.detail)refreshModalAction(m);
  const isShader = m._kind==="shader";
  try{
    let res;
    if(s==="install"){
      res = isShader ? await Bridge.api.install_shader(m.id) : await Bridge.api.install_mod(m.id);
      if(res && res.ok){
        m.state="installed"; if(isShader&&res.filename)m._filename=res.filename;
        if(res.version) m._installedVersion=res.version;
        delete state.verList[m.id];
        // 함께 설치된 종속 모드들도 화면에 반영 (예: cloth-config)
        const extra=(res.installed||[]).filter(id=>id!==m.id);
        extra.forEach(id=>{ const dm=DATA.mods.find(x=>x.id===id); if(dm){ dm.state="installed"; refreshItemInPlace(dm,"mods"); } });
        // Modrinth 가 알려준 필수 의존 모드(카탈로그 밖)도 함께 설치된다
        const deps=(res.deps||[]);
        let msg="설치됨: "+title;
        if(extra.length||deps.length){
          const n=extra.length+deps.length;
          msg+=" (필수 모드 "+n+"개 함께 설치)";
        }
        flash(msg);
        if((res.dep_failed||[]).length) flash("일부 필수 모드를 설치하지 못했습니다: "+res.dep_failed[0]);
      }
      else handleModError(res);
    }else if(s==="update"){
      res = isShader ? await Bridge.api.update_shader(m.id) : await Bridge.api.update_mod(m.id);
      if(res && res.ok){
        m.state="installed";
        if(res.version) m._installedVersion=res.version;
        delete state.verList[m.id];
        flash("업데이트됨: "+title+(res.version? " ("+res.version+")":""));
      }
      else handleModError(res);
    }else if(s==="installed"){
      res = isShader ? await Bridge.api.remove_shader(m.id) : await Bridge.api.remove_mod(m.id);
      if(res && res.ok){ m.state="install"; m._installedVersion=null; if(isShader)m._filename=null; delete state.verList[m.id]; flash("제거됨: "+title); }
      else handleModError(res);
    }
  }catch(err){ flash("오류: "+err); }
  m._busy=false;
  delete state.progress[m.id];
  refreshItemInPlace(m,kind);   // 최종 상태로 카드만 갱신
  renderSidebar();
  if(state.detail){ refreshModalAction(m); }
}
function handleModError(res){
  // 백엔드가 담아준 사람이 읽을 메시지를 그대로 노출.
  flash((res && res.message) ? res.message : "작업에 실패했습니다.");
}

/* ================= EVENTS (delegation) ================= */
document.addEventListener("click",function(e){
  /* v3: 계정 드롭다운 외부 클릭 시 닫기 (t 매칭 전에 항상 검사) */
  if(state.acctOpen && !e.target.closest(".acct-root")){ state.acctOpen=false; state.logoutArmed=false; renderAcct(); }
  if(state.skinMenu && !e.target.closest('[data-skin="menu"]') && !e.target.closest(".skin-menu")){
    const h=document.getElementById("skmenu-"+state.skinMenu); if(h)h.innerHTML="";
    state.skinMenu=null;
    if(state.skinDelArmed) disarmFirefly("skinDelArmed",'.skin-menu [data-skin="del"]'); }
  if(state.verMenu && !e.target.closest('[data-ver="menu"]') && !e.target.closest(".ver-menu")){
    const id=state.verMenu; state.verMenu=null; refreshModalActionById(id);
  }
  const t=e.target.closest("[data-nav],[data-cat],[data-install],[data-open],[data-close-modal],[data-close-update],[data-update-install],[data-theme-set],[data-update],[data-flash],[data-libfilter],[data-launch],[data-verchip],[data-act],[data-project],[data-gate],[data-acct],[data-client],[data-skin],[data-skinm],[data-ver],[data-mem],[data-modrm],#theme-steve,.wc");
  if(!t)return;
  /* 오버레이 배경 클릭만 '닫기'로 취급 — 모달 내부(data-stop) 클릭이
     closest 로 오버레이까지 번져 닫히는 것 방지 (v2.1 잠복 버그 수정) */
  /* 드래그 방지: mousedown 이 모달 내부에서 시작됐으면(텍스트 드래그 등)
     mouseup 이 오버레이 밖으로 나가 발생한 click 은 '닫기'로 처리하지 않는다.
     단, 이 판정은 '오버레이 배경 클릭'일 때만 적용 — 모달 내부 버튼 클릭은
     정상 처리해야 하므로 __dragFromInside 를 무조건 섞으면 안 된다. */
  const __clickedOverlayBg = t.classList.contains("overlay");
  const __dragFromInside = window.__mdInsideModal === true;
  const __ovBlock = __clickedOverlayBg && (e.target.closest("[data-stop]") || __dragFromInside);
  if(t.classList.contains("wc")){
    const k=t.getAttribute("data-kind");
    if(Bridge.live){
      if(k==="min") Bridge.api.win_minimize();
      else if(k==="max"){
        Promise.resolve(Bridge.api.win_toggle_max()).then(r=>{
          // 최대화면 '복원'(겹친 사각형), 아니면 '최대화'(단일 사각형) 아이콘
          const maxed = r && r.maxed;
          t.innerHTML = maxed ? "❐" : "▢";
        });
      }
      else if(k==="close") Bridge.api.win_close();
    }else{
      flash("이 미리보기에서는 창 조작이 비활성화되어 있습니다");
    }
    return;
  }
  if(t.id==="theme-steve"){toggleTheme();return;}
  if(t.hasAttribute("data-gate")){
    const gv=t.getAttribute("data-gate");
    if(gv==="terms"){ e.preventDefault(); e.stopPropagation();
      if(Bridge.live) V3().open_terms_page(); else flash("약관 페이지를 엽니다"); return; }
    if(gv==="licenses"){ e.stopPropagation();
      if(Bridge.live) V3().open_licenses_page(); else flash("라이선스 페이지를 엽니다"); return; }
    if(gv==="accept"){ e.stopPropagation(); acceptTerms(); return; }
  }
  if(t.hasAttribute("data-gate")){gateAction(t.getAttribute("data-gate"),t);return;}
  if(t.hasAttribute("data-acct")){acctAction(t.getAttribute("data-acct"));return;}
  if(t.hasAttribute("data-skinm")){if(!__ovBlock)skinModalAction(t.getAttribute("data-skinm"),t);return;}
  if(t.hasAttribute("data-skin")){skinAction(t.getAttribute("data-skin"),t.getAttribute("data-sid"));return;}
  if(t.hasAttribute("data-client")){
    const k=t.getAttribute("data-client");
    if(k==="install")clientInstall();
    else if(k==="launch")doLaunch();
    else if(k==="relogin")showGate("idle");
    else if(k==="cancel")doCancelInstall();
    return;
  }
  if(t.hasAttribute("data-mem")){
    e.stopPropagation();
    const mb=parseInt(t.getAttribute("data-mb"),10);
    if(mb){ memPreview(mb); memCommit(mb); }
    return;
  }
  if(t.hasAttribute("data-ver")){
    e.stopPropagation();
    const k=t.getAttribute("data-ver");
    if(k==="menu"){ toggleVerMenu(t.getAttribute("data-id")); return; }
    if(k==="pick"){ pickVersion(t.getAttribute("data-id"), t.getAttribute("data-vid")); return; }
    return;
  }
  if(t.hasAttribute("data-modrm")){e.stopPropagation();doRemove(t.getAttribute("data-modrm"));return;}
  if(t.hasAttribute("data-install")){e.stopPropagation();doInstall(t.getAttribute("data-install"));return;}
  if(t.hasAttribute("data-update")){
    const upid=t.getAttribute("data-upid");
    if(upid==="app"){
      if(Bridge.live){ Bridge.api.open_release_page(); flash("브라우저에서 릴리스 페이지를 엽니다"); }
      else flash("이 미리보기에서는 비활성화되어 있습니다");

      const btn=t; btn.setAttribute("disabled",""); btn.style.opacity=".6";
      Bridge.api.install_java_async();
      return;
    }else if(upid==="fabric"){
      doFabricUpdate();
      return;
    }else{
      flash(t.getAttribute("data-update")+" 업데이트 확인됨");
    }
    return;
  }
  if(t.hasAttribute("data-theme-set")){setTheme(t.getAttribute("data-theme-set"));return;}
  if(t.hasAttribute("data-flash")){flash(t.getAttribute("data-flash"));return;}
  if(t.hasAttribute("data-verchip")){flash("동글랜드는 현재 "+DATA.account.version+"만을 지원합니다");return;}
  if(t.hasAttribute("data-launch")){doLaunch();return;}
  if(t.hasAttribute("data-act")){handleSettingAct(t.getAttribute("data-act"));return;}
  if(t.hasAttribute("data-project")){
    if(Bridge.live){ Bridge.api.open_project_page(t.getAttribute("data-pkind"), t.getAttribute("data-project")); flash("브라우저에서 프로젝트 페이지를 엽니다"); }
    else flash("이 미리보기에서는 비활성화되어 있습니다");
    return;
  }
  if(t.hasAttribute("data-close-modal")){if(!__ovBlock){state.detail=null;renderModal();}return;}
  if(t.hasAttribute("data-close-update")){if(!__ovBlock)closeUpdateModal();return;}
  if(t.hasAttribute("data-update-install")){
    if(Bridge.live){ Bridge.api.open_release_page(); flash("브라우저에서 릴리스 페이지를 엽니다"); }
    closeUpdateModal();
    return;
  }

/* ================= BRIDGE + ADAPTER (pywebview ↔ browser) =================
   설계:
   - 브라우저에서 file:// 로 열면 window.pywebview 가 없으므로 기존 더미
     DATA 로 그대로 동작한다(디자인 작업용 폴백). 아무것도 안 바뀐다.
   - pywebview 안에서는 window.pywebview.api 가 준비되면(pywebviewready)
     백엔드에서 카탈로그/상태/버전을 받아 DATA 를 '제자리 갱신'하고 다시
     그린다. const DATA 참조는 유지한 채 배열 내용만 교체하므로 렌더 함수는
     수정 없이 그대로 쓴다.
   - 모드 id 는 각 항목에 m.id 로 실어두고, 설치/제거/업데이트는 id 로 호출한다.
     (표시 키는 기존대로 title 유지 → 렌더 함수 변경 최소화)                */
const Bridge = { live:false, api:null };

/* 카탈로그 카테고리(한글) → 아이콘 매핑 */
const CAT_ICON = {
  "전체":"layout-grid","필수":"shield-check","최적화":"zap","시각":"sun",
  "사운드":"message-circle","지도":"compass","한글":"tag","편의":"wrench",
};
/* 썸네일 그라디언트 팔레트(무채색 계열 중심, id 해시로 고정 선택) */
const GRAD = [
  "linear-gradient(140deg,#3AD6D6,#1E9B9B)","linear-gradient(140deg,#9B6DD6,#1E9B9B)",
  "linear-gradient(140deg,#6DBE45,#2FB86B)","linear-gradient(140deg,#63B5F2,#3AD6D6)",
  "linear-gradient(140deg,#F4C13C,#F0803C)","linear-gradient(140deg,#2FB86B,#4E9A2E)",
  "linear-gradient(140deg,#9B6DD6,#F4C13C)","linear-gradient(140deg,#63B5F2,#6DBE45)",
];
function gradientFor(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return GRAD[h%GRAD.length];}
function buildBadges(m){
  const b=[{label:"Fabric",tone:"grass"}];
  if(m.required)b.push({label:"필수",tone:"gold"});
  else b.push({label:m.category,tone:"neutral"});
  return b;
}

/* get_catalog() 결과 → DATA.mods / DATA.categories 제자리 갱신 */
function applyCatalog(cat){
  // 카테고리 (전체 → id "all" 로 맞춰 기존 '전체' 필터 로직 재사용)
  DATA.categories.length=0;
  (cat.categories||[]).forEach(c=>{
    DATA.categories.push({ id:(c==="전체"?"all":c), label:c, icon:CAT_ICON[c]||"layout-grid", count:0 });
  });
  // 모드
  DATA.mods.length=0;
  (cat.mods||[]).forEach(m=>{
    DATA.mods.push({
      id:m.id,
      title:m.name,
      author:m.author||"",                        // 번들 모드는 카탈로그에 하드코딩, 나머지는 Modrinth
      downloads:m.size_label||"—",                 // 번들 모드는 파일 크기, 나머지는 다운로드수(loadMedia)
      _bundled:!m.has_slug,
      _version:m.version||null,                    // 번들 모드는 하드코딩 버전
      state:"install",                             // scan 전 기본값
      cat:m.category,
      required:!!m.required,
      color:gradientFor(m.id),
      icon:null, image:null,          // get_mod_media 로 채움
      blurb:(m.description||"").split("\n")[0],     // 첫 줄만 요약
      badges:buildBadges(m),
      _deps:m.dependencies||[],
      _group:m.exclusive_group||null,
      _hasSlug:!!m.has_slug,
      _kind:"mod",
    });
  });
  // 카테고리별 개수 채우기
  DATA.categories.forEach(c=>{
    c.count = (c.id==="all") ? DATA.mods.length
      : DATA.mods.filter(m=>m.cat===c.id).length;
  });
  // 셰이더는 Shaders 탭을 열 때 lazy-load 한다(loadShaders). 초기엔 비움.
  // ⚠️ 데이터를 비우면 로드 플래그도 반드시 함께 내려야 한다. 안 그러면
  // loadShaders() 가드(state.shadersLoaded)에 걸려 재로드되지 않고
  // 셰이더 탭이 영영 빈 목록으로 남는다. (계정 전환 → bootMain 재실행 시 발생)
  DATA.shaders.length=0;
  DATA.shaderCategories.length=0;
  state.shadersLoaded=false;
}

/* get_shaders() 결과 → DATA.shaders / DATA.shaderCategories 제자리 갱신 */
/* Modrinth 셰이더 카테고리(고정 태그) 중 스타일 위주로 큐레이션한 한글 맵 */
const SHADER_CAT_KO = {
  "realistic":"사실적", "semi-realistic":"반사실적", "fantasy":"판타지",
  "vanilla-like":"바닐라풍", "cartoon":"카툰", "atmosphere":"분위기",
  "colored-lighting":"컬러조명", "pbr":"PBR", "shadows":"그림자",
  "reflections":"반사", "foliage":"초목", "bloom":"블룸",
  "path-tracing":"패스트레이싱", "cursed":"컬트",
};
/* 카테고리 바에 노출할 큐레이션 목록(스타일 중심) — 난잡한 전체 태그 대신 */
const SHADER_CAT_BAR = [
  {id:"all",            label:"전체",    icon:"layout-grid"},
  {id:"realistic",      label:"사실적",  icon:"sun"},
  {id:"semi-realistic", label:"반사실적", icon:"sun"},
  {id:"fantasy",        label:"판타지",  icon:"sparkles"},
  {id:"vanilla-like",   label:"바닐라풍", icon:"leaf"},
  {id:"cartoon",        label:"카툰",    icon:"palette"},
];
const SHADER_STYLE_ORDER = ["realistic","semi-realistic","fantasy","vanilla-like","cartoon"];

function applyShaders(res){
  DATA.shaders.length=0;
  const shaders = (res && res.shaders) || [];
  shaders.forEach(sh=>{
    const st = sh.status==="not_installed" ? "install" : sh.status; // installed/update/install
    const cats = (sh.categories || []).map(c=>String(c).toLowerCase());
    // 배지에 쓸 대표 스타일: 스타일 카테고리 우선, 없으면 첫 카테고리
    const style = SHADER_STYLE_ORDER.find(s=>cats.includes(s)) || cats[0] || null;
    const styleKo = style ? (SHADER_CAT_KO[style] || style) : null;
    DATA.shaders.push({
      id: sh.slug,                                   // 백엔드 호출 키 = slug
      title: sh.title || sh.slug,
      author: "",
      downloads: fmtDownloads(sh.downloads),
      state: st,
      cat: style || "기타",          // 대표 카테고리(배지/표시용)
      _cats: cats,                    // 전체 카테고리(필터용) — 셰이더는 여러 개
      color: gradientFor(sh.slug || sh.title || "s"),
      icon: sh.icon_url || null,
      image: sh.image || sh.icon_url || null,
      blurb: (sh.description||"").split("\n")[0],
      badges: [{label:"Iris",tone:"amethyst"}].concat(styleKo?[{label:styleKo,tone:"neutral"}]:[]),
      _kind: "shader",
      _filename: sh.filename || null,
    });
  });
  // 큐레이션된 고정 카테고리 바 (셰이더가 해당 카테고리를 포함하면 카운트)
  DATA.shaderCategories.length=0;
  SHADER_CAT_BAR.forEach(c=>{
    const count = c.id==="all" ? DATA.shaders.length
      : DATA.shaders.filter(s=>s._cats && s._cats.includes(c.id)).length;
    DATA.shaderCategories.push({id:c.id, label:c.label, icon:c.icon, count:count});
  });
}
function fmtDownloads(n){
  n=+n||0;
  if(n>=1e6) return (n/1e6).toFixed(1)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"K";
  return String(n);
}

/* scan_mods() 결과 → 각 모드 state 갱신
   백엔드: installed | update | not_installed
   렌더:   installed | update | install                     */
function applyStatuses(statuses, versions){
  statuses = statuses||{}; versions = versions||{};
  DATA.mods.forEach(m=>{
    const s=statuses[m.id];
    if(s==="not_installed"){ m.state="install"; m._installedVersion=null; }
    else if(s) m.state=s;   // installed / update
    const v=versions[m.id];
    if(v){ m._installedVersion=v.installed||null; if(v.latest) m._latest=v.latest; }
  });
  state.installs={};        // 로컬 오버라이드 제거 → 백엔드 상태가 진실
}

/* get_versions() 결과 → System 화면 + Play 버전칩 갱신
   최신버전(업데이트 여부) 확인은 네트워크 필요 → 후속 '시스템' 단계.
   지금은 현재 버전만 반영하고 '최신'으로 표시(가짜 업데이트 알림 방지).  */
function applyVersions(v){
  if(!v) return;
  const by={}; DATA.system.forEach(r=>by[r.id]=r);
  // 현재 버전만 반영. 최신 여부는 실제 업데이트 확인(applyUpdateResult)에서 결정.
  if(by.app){ by.app.current=v.app; if(by.app.latest!==false) by.app.newest=v.app; }
  DATA.account.appVersion = v.app || DATA.account.appVersion;
  if(v.app_channel) DATA.account.appChannel = v.app_channel;
  if(by.java){ by.java.current=v.java; if(by.java.latest!==false) by.java.newest=v.java; }
  if(by.fabric){
    by.fabric.current=v.fabric;
    if(by.fabric.latest!==false) by.fabric.newest=v.fabric;
    /* 게임 설치 후: current 가 실제 버전이 됐는데 newest 가 "설치 필요" 같은
       자리표시자로 남아 "0.19.3 → 설치 필요" 로 보이던 문제.
       설치는 항상 최신 stable 로더를 쓰므로 이 시점엔 최신이 맞다. */
    if(!_VER_PLACEHOLDER.includes(v.fabric) && _VER_PLACEHOLDER.includes(by.fabric.newest)){
      by.fabric.newest=v.fabric; by.fabric.latest=true;
    }
  }
  if(v.game_version) DATA.account.version = v.game_version+" · Fabric";
}

/* 실제 업데이트 확인 결과를 버전 행에 반영 (최신 ↔ 업데이트 전환) + 앱 업데이트 정보 저장 */
function applyUpdateResult(r){
  if(!r) return;
  const by={}; DATA.system.forEach(row=>by[row.id]=row);
  const app=r.app||{}, jv=r.java||{}, fab=r.fabric||{};
  if(by.app){
    if(app.status==="update_available"){ by.app.latest=false; by.app.newest=app.latest||by.app.newest; by.app.note=null; }
    else if(app.status==="up_to_date"){ by.app.latest=true; by.app.newest=app.current||by.app.current; by.app.note=null; }
    else {
      /* rate_limited / no_release / check_failed:
         확인에 실패한 것을 '최신' 으로 보여주면 안 된다. */
      by.app.latest=true;                 // 업데이트 버튼은 띄우지 않되
      by.app.newest=app.current||by.app.current;
      by.app.note=app.message||"업데이트를 확인하지 못했습니다";
    }
  }
  if(app.status==="update_available"){
    state.updateInfo={available:true, current:app.current, latest:app.latest, notes:app.notes||"", page_url:app.page_url||""};
  }else if(app.status==="up_to_date"){
    state.updateInfo={available:false, current:app.current};
  }else if(app.status){
    state.updateInfo={available:false, current:app.current, failed:true, message:app.message||""};
  }
  if(by.java){
    state.javaStatus=jv;   // 버튼 핸들러가 needed/managed 구분에 사용
    if(jv.status==="ok"){ by.java.latest=true; }
    else if(jv.status==="managed"){ by.java.latest=true; by.java.newest=by.java.current; }
    else if(jv.status==="needed"){ by.java.latest=false; by.java.newest="Java "+(jv.required||25)+"+ 필요"; }
  }
  if(by.fabric){
    if(fab.status==="up_to_date"){
      by.fabric.latest=true;
      if(fab.installed) by.fabric.current=fab.installed;
      by.fabric.newest=by.fabric.current;      // 옛 "설치 필요" 잔재 제거
    }
    else if(fab.status==="update_available"){
      by.fabric.latest=false;
      if(fab.installed) by.fabric.current=fab.installed;
      by.fabric.newest=fab.latest||by.fabric.newest;
    }
    else if(fab.status==="not_installed"){ by.fabric.latest=false; by.fabric.current="미설치"; by.fabric.newest="설치 필요"; }
  }
}

let __ngBooted=false;
async function bootFromBackend(){
  if(__ngBooted) return;      // 중복 부트 방지 (JS 폴링 + Python 트리거 양쪽 대비)
  __ngBooted=true;
  Bridge.live=true; Bridge.api=window.pywebview.api;
  state.booting=true; renderAll();   // 스캔 완료까지 로딩 화면 유지
  /* ★ v3: 로그인 게이트 선행 — 계정 없으면 여기서 멈추고, 로그인 성공 시
     afterLogin() 이 bootMain() 을 이어서 부른다. */
  // 약관 동의가 먼저다. 동의 전에는 로그인 절차로 넘어가지 않는다.
  try{
    const ts = await V3().get_terms_status();
    if(ts && ts.ok && !ts.accepted){
      state.booting=false; renderAll();
      showGate("terms");
      return;   // acceptTerms() 가 continueBoot() 로 이어받는다
    }
  }catch(_){ /* 확인 실패 시 기존 흐름 유지 */ }
  try{
    await bootAfterTerms();
  }catch(e){
    // 부팅 중 예외가 나도 '불러오는 중' 에 갇히지 않게 한다
    state.booting=false; renderAll();
    showGate("idle");
    flash("초기화 중 문제가 발생했습니다: "+e);
  }
}
/* 부팅의 나머지(계정 확인 → 메인). 약관 동의 후에도 여기로 이어진다.
   ⚠️ bootFromBackend() 를 다시 부르면 __ngBooted 가드에 막혀 영원히 로딩 상태가 된다. */
async function bootAfterTerms(){
  let ast=null;
  try{ ast = await Bridge.api.auth_status(); }catch(_){ ast=null; }
  state.auth = (ast && ast.logged_in) ? ast : {logged_in:false};
  renderAcct();
  if(!state.auth.logged_in){
    state.booting=false; renderAll();
    showGate("idle");
    return;
  }
  await bootMain();
}
/* 로그인 이후의 부트(사전 점검 → 카탈로그/스캔). 게이트 통과 시에도 재사용. */
async function bootMain(){
  state.booting=true; renderAll();
  try{
    // ★ 사전 점검(스마트) — 문제 있을 때만 화면, 정상이면 조용히 통과 ★
    let qc=null;
    try{ qc = await Bridge.api.quick_check(); }catch(_){ qc=null; }
    if(qc && qc.ok===false){
      startPreflight(qc);   // 점검 화면 표시 + 실제 점검(run_preflight_async) 진행
      return;               // 완료(onPreflight "done")에서 continueBoot() 이어감
    }
    await continueBoot();
  }catch(err){
    flash("백엔드 로딩 오류: "+err);
  }
}

function startPreflight(qc){
  state.preflight = {
    active:true,
    status:{mc:"pending",java:"pending",fabric:"pending"},
    message:"설치 전 준비 상태를 확인하는 중…",
    step:"start",
    error:null,
    needsInstaller:false,
  };
  // 이미 정상인 단계는 미리 done 표시 (quick_check 결과 반영)
  if(qc && qc.problems){
    ["mc","java","fabric"].forEach(k=>{
      if(qc.problems.indexOf(k)===-1) state.preflight.status[k]="done";
    });
  }
  state.booting=false;
  renderPreflight();
  // 실제 점검/설치 시작
  Bridge.api.run_preflight_async();
}

/* Java 설치/교체 진행 (설정 탭 Java 업데이트 버튼) */
window.onJavaInstall = function(phase, payload){
  payload = payload || {};
  if(phase==="progress"){
    const pct = Math.round(payload.pct||0);
    // 설치 마법사(UAC) 없이 인스턴스 안에 바로 내려받는다
    flash("Java 런타임 내려받는 중… "+pct+"%");
  }else if(phase==="done"){
    state.javaInstalling=false;
    state.javaStatus=payload;
    const st=payload.status;
    if(st==="managed") flash("Java 런타임 준비 완료 — 게임 실행 가능");
    else if(st==="ok") flash("Java가 준비됐습니다 ✓");
    else if(st==="needed") flash("Java 를 준비하지 못했습니다. 다시 시도해주세요");
    else flash("Java 상태를 확인할 수 없습니다");
    reloadVersions();
    if(Bridge.live){ Bridge.api.check_updates().then(applyUpdateResult).catch(()=>{}); }
  }else if(phase==="error"){
    state.javaInstalling=false;
    flash("Java 설치 오류: "+(payload.message||"알 수 없는 오류"));
    if(state.nav==="system") renderScreen(false);
  }
};

window.onPreflight = function(step, message){
  const pf = state.preflight;
  if(!pf || !pf.active) return;
  pf.step = step; pf.message = message||"";
  const map = PF_STEP_MAP[step];
  if(map){
    const [stage, st] = map;
    if(stage && st){
      // 이전 단계들은 done 으로 마무리
      const idx = PF_STAGES.findIndex(s=>s.key===stage);
      for(let i=0;i<idx;i++) pf.status[PF_STAGES[i].key]="done";
      pf.status[stage]=st;
    }
  }
  // 설치 마법사 실행 단계 → 사용자 조작 필요 안내
  // v3: 외부 설치 마법사(UAC)를 띄우지 않는다 → 항상 false
  pf.needsInstaller = false;

  if(step==="error" || step==="mc_not_found"){
    pf.error = message || "문제가 발생했습니다.";
  }
  if(step==="done"){
    pf.error=null;
    ["mc","java","fabric"].forEach(k=>pf.status[k]="done");
    renderPreflight();
    // 잠깐 완료 표시 후 런처로
    setTimeout(()=>{ pf.active=false; state.booting=true; renderAll(); continueBoot(); }, 700);
    return;
  }
  renderPreflight();
};

function pfRetry(){
  // 다시 점검 (경로/버전 재확인 후 필요하면 재설치)
  if(!state.preflight) return;
  state.preflight.error=null;
  state.preflight.message="다시 확인하는 중…";
  state.preflight.status={mc:"pending",java:"pending",fabric:"pending"};
  renderPreflight();
  Bridge.api.run_preflight_async();
}
function pfSkip(){
  // 건너뛰고 런처로 (사용자가 직접 해결하겠다는 선택)
  if(state.preflight) state.preflight.active=false;
  state.booting=true; renderAll(); continueBoot();
}

function renderPreflight(){
  const holder=document.getElementById("screen-holder");
  if(!holder) return;
  const pf=state.preflight; if(!pf) return;
  const stIcon=(st)=> st==="done" ? '<span style="color:var(--grass-500)">'+ic("check",18)+'</span>'
    : st==="active" ? '<span class="ng-spinner" style="width:16px;height:16px;border:2px solid var(--tint-grass-edge,rgba(120,200,120,.25));border-top-color:var(--grass-500);border-radius:50%;display:inline-block;animation:ngspin .8s linear infinite"></span>'
    : st==="error" ? '<span style="color:var(--tint-redstone-text)">'+ic("x",18)+'</span>'
    : '<span style="opacity:.4">'+ic("clock",18)+'</span>';
  const rows = PF_STAGES.map(s=>{
    const st=pf.status[s.key];
    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0">'
      +'<div style="width:22px;display:flex;justify-content:center">'+stIcon(st)+'</div>'
      +'<div style="width:20px;color:var(--text-muted)">'+ic(s.icon,18)+'</div>'
      +'<div style="font-size:var(--text-md);color:'+(st==="pending"?"var(--text-muted)":"var(--text-strong)")+'">'+esc(s.label)+'</div>'
      +'</div>';
  }).join("");

  let foot="";
  if(pf.error){
    foot='<div style="margin-top:8px;padding:12px 14px;border-radius:10px;background:var(--tint-redstone-fill,rgba(226,75,75,.08));border:1px solid var(--tint-redstone-edge);color:var(--tint-redstone-text);font-size:var(--text-sm);white-space:pre-line">'+esc(pf.error)+'</div>'
      +'<div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">'
        +'<button class="btn" onclick="pfSkip()">건너뛰기</button>'
        +'<button class="btn btn--primary" onclick="pfRetry()">'+ic("refresh-cw",18)+'다시 시도</button>'
      +'</div>';
  }else if(pf.needsInstaller){
    foot='<div style="margin-top:8px;padding:12px 14px;border-radius:10px;background:var(--tint-gold-fill,rgba(244,193,60,.1));border:1px solid var(--tint-gold-edge,rgba(244,193,60,.3));color:var(--tint-gold-text,#b8860b);font-size:var(--text-sm);white-space:pre-line">'+ic("alert-triangle",16)+' 설치 창이 열립니다. 창에서 진행을 완료해주세요.</div>';
  }

  holder.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:460px;padding:24px">'
    +'<div style="width:100%;max-width:440px" class="tile card-pad">'
      +'<h1 class="page-h1" style="margin-bottom:4px">설치 전 준비</h1>'
      +'<div class="page-sub" style="margin-bottom:18px">게임 구동에 필요한 항목을 확인합니다</div>'
      +rows
      +'<div style="margin-top:14px;font-size:var(--text-sm);color:var(--text-muted);white-space:pre-line;min-height:20px">'+esc(pf.message||"")+'</div>'
      +foot
    +'</div></div>';
}

/* 사전 점검 통과 후(또는 불필요 시) 실제 런처 데이터 로드 */
async function continueBoot(){
  try{
    const ready = await Bridge.api.ensure_ready();
    if(!ready || !ready.ready){
      state.booting=false; renderAll();
      flash((ready&&ready.reason)||"마인크래프트 경로 준비 실패");
      return;
    }
    const cat = await Bridge.api.get_catalog();
    applyCatalog(cat);
    const ver = await Bridge.api.get_versions();
    applyVersions(ver);
    // 설치된 모드 개수가 정확해질 때까지(스캔 완료) 로딩 화면을 유지한다.
    const scan = await Bridge.api.scan_mods();
    if(scan && scan.ok){ applyStatuses(scan.statuses, scan.versions); }
    else if(scan && scan.reason){ flash(scan.reason); }
    state.booting=false;          // 스캔까지 끝난 뒤 실제 런처 렌더
    renderAll();
    // 미디어(아이콘/사진/다운로드/제작자)와 셰이더 목록을 부팅 때 미리 로드.
    // await 없이 병렬로 돌려 서로 막지 않게 하고, 각자 끝나면 화면을 갱신한다.
    loadMedia();
    loadShaders();
    loadShaderReady();
    loadServerStatus();
    refreshClient();          // v3: 게임 설치 상태 → 플레이 탭 설치 카드/버튼
    refreshSkinLib();         // v3: 스킨 라이브러리
    checkAppUpdateOnBoot();   // 로딩 종료 후 앱 업데이트 확인 → 있으면 모달
    if(!window.__serverTimer){
      window.__serverTimer = setInterval(()=>{ if(Bridge.live && state.nav==="play") loadServerStatus(); }, 60000);
    }
  }catch(err){
    flash("백엔드 로딩 오류: "+err);
  }
}

/* 모드 미디어(아이콘/사진/다운로드수) 배치 로드 후 제자리 반영 */
async function loadMedia(){
  if(!Bridge.live) return;
  try{
    const res = await Bridge.api.get_mod_media();
    if(!res || !res.ok || !res.media) return;
    const media = res.media;
    DATA.mods.forEach(m=>{
      const info = media[m.id];
      if(info){
        if(info.icon_url) m.icon = info.icon_url;
        if(info.image) m.image = info.image;
        else if(info.icon_url) m.image = info.icon_url;   // 사진 없으면 아이콘으로
        if(typeof info.downloads==="number") m.downloads = fmtDownloads(info.downloads);
        if(info.author && !m.author) m.author = info.author;  // 번들(루안 등)은 유지
        if(info.author) m._detailLoaded = m._detailLoaded;    // 제작자는 이미 확보
      }
    });
    // 카드/라이브러리의 by 제작자·사진이 즉시 반영되도록 현재 화면 갱신
    if(state.nav==="mods"||state.nav==="library"||state.nav==="play") renderScreen(false);
  }catch(_){}
}

/* 모달 열릴 때 제작자·최신버전을 Modrinth 에서 지연 로드 (해당 1개만).
   모달 전체를 다시 그리지 않고 제작자/버전 셀만 부드럽게(fade) 채운다. */
async function loadDetail(title){
  if(!Bridge.live) return;
  const m=findMod(title); if(!m) return;
  if(m._detailLoaded) return;          // 캐시 (한 번만)
  const kind = m._kind==="shader" ? "shader" : "mod";
  try{
    const d = await Bridge.api.get_project_detail(kind, m.id);
    if(d && d.ok){
      if(d.author) m.author=d.author;
      if(d.version) m._version=d.version;
      if(d.image && !m.image) m.image=d.image;
      if(d.icon_url && !m.icon) m.icon=d.icon_url;
      m._detailLoaded=true;
      // 모달이 아직 이 항목을 보고 있으면 두 셀만 제자리 갱신 (껌벅임 방지)
      if(state.detail && state.detail.title===title){
        const root=document.getElementById("modal-root");
        /* ⚠️ textContent 로 덮으면 안의 SVG 아이콘이 지워진다.
           아이콘을 쓰는 셀은 텍스트 노드만 교체한다. */
        const setCell=(key,val)=>{ if(!val)return; const el=root&&root.querySelector('[data-meta="'+key+'"]');
          if(!el || el.textContent.trim()===String(val).trim()) return;
          const svg=el.querySelector("svg");
          if(svg){ el.innerHTML=""; el.appendChild(svg); el.appendChild(document.createTextNode(" "+val)); }
          else el.textContent=val;
          el.classList.remove("meta-fill"); void el.offsetWidth; el.classList.add("meta-fill"); };
        setCell("author", m.author);
        setCell("version", m._latest||m._version);
        setCell("installed-version", installedVerText(m));
      }
    }
  }catch(_){}
}

/* 셰이더 설치 상태만 가볍게 재확인 (로컬 폴더 스캔, 네트워크 없음) */
async function refreshShaderStatuses(){
  try{
    const r = await V3().shader_statuses();
    if(!r || !r.ok) return;
    let changed=false;
    DATA.shaders.forEach(sh=>{
      const st=r.statuses[sh.id];
      if(!st) return;
      const want = (st==="not_installed") ? "install" : sh.state;
      if(st==="not_installed" && sh.state!=="install"){ sh.state="install"; sh._filename=null; changed=true; }
      else if(st==="installed" && sh.state==="install"){ sh.state="installed"; changed=true; }
    });
    if(changed && state.nav==="shaders"){ renderScreenSoon(); renderSidebar(); }
  }catch(_){}
}

/* Shaders 탭 최초 진입 시 lazy-load (Modrinth 검색 — 수 초 소요) */
let __shaderLoading=false;
async function loadShaders(){
  // 플래그가 true 여도 데이터가 비었으면 재로드 (상태/데이터 불일치 방어)
  if(!Bridge.live || __shaderLoading) return;
  if(state.shadersLoaded && DATA.shaders.length>0) return;
  __shaderLoading=true;
  try{
    const res = await Bridge.api.get_shaders("");
    if(res && res.ok){
      applyShaders(res);
      state.shadersLoaded=true;
    }else{
      flash((res&&res.reason)||"셰이더 목록을 불러오지 못했습니다.");
    }
  }catch(err){
    flash("셰이더 로딩 오류: "+err);
  }
  __shaderLoading=false;
  // 셰이더 탭뿐 아니라 플레이(설치 셰이더 수)·라이브러리에도 반영
  if(state.nav==="shaders"||state.nav==="play"||state.nav==="library") renderScreenSoon();
}

/* 게임 실행 — 백엔드로 마인크래프트 실행 + 플레이 시간 세션 시작 */
/* v3 게임 실행: 로그인 계정으로 직접 실행 + 동글랜드 서버 자동 접속.
   필수 모드 게이팅·토큰 만료·미설치는 백엔드 오류 코드로 받아 분기한다. */
async function doLaunch(){
  if(state.launchBusy) return;
  state.launchBusy=true; state.launchPrep=null;
  if(state.nav==="play") renderScreen(false);
  flash("게임 파일을 확인하는 중…");
  try{
    const r = await V3().client_launch();
    state.launchPrep=null;
    if(r && r.ok){
      flash("게임을 실행했습니다 — 동글랜드 서버로 자동 접속합니다");
      if(Bridge.live) setTimeout(loadPlaytime, 4000);
      state.launchBusy=false;
      state.gameRunning=true;      // 실행 중 → 버튼 '게임 실행 중' 비활성
      if(state.nav==="play") renderScreen(false);
      startGameRunningPoll();      // 게임 종료되면 버튼 원복
      return;
    }
    state.launchBusy=false; if(state.nav==="play") renderScreen(false);
    const code=r&&r.error;
    if(code==="relogin"){
      state.auth={logged_in:false}; renderAcct(); showGate("idle");
      flash("로그인이 만료됐습니다. 다시 로그인해주세요.");
    }else if(code==="required_missing"){
      flash((r&&r.message)||"필수 모드를 먼저 설치하세요"); setNav("mods");
    }else if(code==="not_installed"){
      flash((r&&r.message)||"먼저 게임을 설치해주세요");
    }else if(code==="verify_failed"){
      // 파일 검증/복구 실패 — 설치 상태가 깨졌을 수 있으니 다시 확인
      flash((r&&r.message)||"게임 파일 검증에 실패했습니다");
      refreshClient();
    }else{
      flash((r&&r.message)||"실행에 실패했습니다");
    }
  }catch(err){
    state.launchBusy=false; state.launchPrep=null;
    if(state.nav==="play") renderScreen(false);
    flash("실행 오류: "+err);
  }
}

/* 게임 실행 상태 폴링 — 프로세스가 종료되면 버튼을 '게임 실행'으로 원복 */
function startGameRunningPoll(){
  if(window.__gameRunTimer) clearInterval(window.__gameRunTimer);
  if(!Bridge.live){
    // 미리보기: 실제 프로세스가 없으므로 12초 후 종료된 것으로 처리
    window.__gameRunTimer=setTimeout(()=>{ state.gameRunning=false; if(state.nav==="play") renderScreen(false); }, 12000);
    return;
  }
  window.__gameRunTimer=setInterval(async()=>{
    try{
      const r=await Bridge.api.game_running();
      if(!r || !r.running){
        clearInterval(window.__gameRunTimer); window.__gameRunTimer=null;
        state.gameRunning=false;
        refreshLaunchBtn();     // 화면 전체가 아니라 버튼만
        loadPlaytime();
      }
    }catch(_){}
  }, 5000);  // 5초마다 확인
}

/* 버전 행의 최신↔업데이트 상태를 제자리에서 스르륵 갱신 (스크롤 유지) */
function updateVerRowsInPlace(){
  if(state.nav!=="system") return;
  DATA.system.forEach(v=>{
    // 왼쪽 텍스트(현재 → 새 버전)도 함께 갱신해야 뱃지와 어긋나지 않는다.
    const txt=document.querySelector('[data-vertext="'+v.id+'"]');
    if(txt){
      const t=verTextHTML(v);
      if(txt.innerHTML.trim()!==t.trim()) txt.innerHTML=t;
    }
    const holder=document.querySelector('.ver-status[data-verid="'+v.id+'"]');
    if(!holder) return;
    const html = verStatusHTML(v);
    if(holder.innerHTML.trim()!==html.trim()){
      holder.innerHTML=html;
      holder.classList.remove("swap"); void holder.offsetWidth; holder.classList.add("swap");
    }
  });
}

async function handleSettingAct(act){
  if(!Bridge.live){ flash("이 미리보기에서는 비활성화되어 있습니다"); return; }
  // 초기화가 아닌 다른 버튼을 누르면 초기화 확인 상태 해제
  if(act!=="reset" && state.resetArmed) disarmFirefly("resetArmed",'[data-act="reset"]');
  if(act!=="reinstall" && state.reinstallArmed) disarmFirefly("reinstallArmed",'[data-act="reinstall"]');

  if(act==="instance-folder"){
    const r=await Bridge.api.open_instance_folder();
    flash(r&&r.ok?"인스턴스 폴더를 열었습니다":((r&&r.message)||"폴더를 열 수 없습니다"));
    return;
  }
  if(act==="reinstall"){
    if(!state.reinstallArmed){ armFirefly("reinstallArmed",'[data-act="reinstall"]',"한 번 더 누르면 게임을 다시 설치합니다"); return; }
    disarmFirefly("reinstallArmed",'[data-act="reinstall"]');
    const r=await Bridge.api.client_reinstall_async();
    if(r&&r.started){
      state.client=Object.assign({},state.client||{},{installed:false,installing:true});
      state.clientPct=0; state.clientMsg="재설치 준비 중…";
      setNav("play"); flash("게임을 다시 설치합니다");
    }else{
      flash((r&&r.message)||"재설치를 시작할 수 없습니다"); renderScreen(false);
    }
    return;
  }
  if(act==="game-folder"){
    const r=await Bridge.api.open_instance_folder();
    flash(r&&r.ok?"게임 폴더를 열었습니다":((r&&r.message)||"폴더를 열 수 없습니다"));
  }else if(act==="mods-folder"){
    const r=await Bridge.api.open_mods_folder();
    flash(r&&r.ok?"모드 폴더를 열었습니다":((r&&r.message)||"폴더를 열 수 없습니다"));
  }else if(act==="shader-folder"){
    const r=await Bridge.api.open_shaderpacks_folder();
    flash(r&&r.ok?"셰이더팩 폴더를 열었습니다":((r&&r.message)||"폴더를 열 수 없습니다"));
  }else if(act==="logs"){
    const r=await Bridge.api.open_log_folder();
    flash(r&&r.ok?"로그 폴더를 열었습니다":((r&&r.message)||"로그 폴더를 열 수 없습니다"));
  }else if(act==="support"){
    const r=await Bridge.api.open_support();
    flash(r&&r.ok?"브라우저에서 지원 채널을 열었습니다":"열 수 없습니다");
  }else if(act==="check-updates"){
    flash("업데이트를 확인하는 중…");
    try{
      const r=await Bridge.api.check_updates();
      applyUpdateResult(r);
      updateVerRowsInPlace();   // 최신 ↔ 업데이트 스르륵 전환
      const app=(r&&r.app)||{}, jv=(r&&r.java)||{}, fab=(r&&r.fabric)||{};
      const parts=[];
      if(app.status==="update_available") parts.push("앱 새 버전 "+(app.latest||""));
      else if(app.status==="up_to_date") parts.push("앱 최신");
      else parts.push("앱 확인 실패");
      if(jv.status==="ok") parts.push("Java "+(jv.major||jv.version||"")+" ✓");
      else if(jv.status==="managed") parts.push("Java "+(jv.major||"")+" (런처 관리)");
      else if(jv.status==="needed") parts.push("Java "+(jv.required||25)+" 이상 필요 (현재 "+(jv.major||jv.version||"없음")+")");
      if(fab.status==="update_available") parts.push("Fabric 새 버전 "+(fab.latest||""));
      else if(fab.status==="up_to_date") parts.push("Fabric 최신");
      else if(fab.status==="not_installed") parts.push("Fabric 미설치");
      flash(parts.join(" · "));
    }catch(e){ flash("업데이트 확인 중 오류"); }
  }else if(act==="reset"){
    const btn=document.querySelector('[data-act="reset"]');
    if(!state.resetArmed){
      // 1단계: 무장 (버튼만 제자리 갱신 → 스크롤 유지)
      armFirefly("resetArmed",'[data-act="reset"]',"한 번 더 누르면 초기화됩니다");
    }else{
      // 2단계: 실행
      disarmFirefly("resetArmed",'[data-act="reset"]');
      flash("초기화하는 중…");
      try{
        const r=await Bridge.api.reset_instance();
        if(r&&r.ok){
          flash("초기화 완료 — 모드 "+r.removed_mods+"개, 셰이더 "+r.removed_shaders+"개 제거");
          const scan=await Bridge.api.scan_mods();
          if(scan&&scan.ok){ applyStatuses(scan.statuses, scan.versions); }
          loadShaders(); renderSidebar();
        }else{ flash((r&&r.message)||"초기화 실패"); }
      }catch(e){ flash("초기화 중 오류: "+e); }
    }
  }
}

/* Python→JS 진행률 push 수신. 전체 재렌더 없이 해당 버튼 텍스트만 갱신
   (스크롤/포커스 유지). id 는 모드 id 또는 셰이더 slug. */
window.onProgress = function(id, pct){
  pct = Math.max(0, Math.min(100, pct|0));
  state.progress[id] = pct;
  try{
    var sel = '.install[data-id="'+String(id).replace(/"/g,'\\"')+'"]';
    document.querySelectorAll(sel).forEach(function(btn){
      btn.innerHTML = '<span aria-hidden="true">…</span>'+pct+'%';
    });
  }catch(_){}
};

function initApp(){
  // ★ pywebview 브릿지 준비 감지 — 폴링 방식 ★ (이벤트만 의존하면 놓칠 수 있음)
  // + 시작 시 더미 깜빡임 제거: 첫 페인트는 '로딩 화면'으로 두고, 백엔드
  //   데이터가 준비되면 그때 실제 콘텐츠를 그린다. 브라우저(브릿지 없음)로
  //   판정되면 그때 더미로 폴백한다.
  let booted=false;
  function boot(){ if(booted)return; booted=true; state.booting=false; bootFromBackend(); }

  state.booting=true;   // 더미 대신 로딩 표시
  renderAll();

  // 이미 준비됐으면 즉시
  if(window.pywebview && window.pywebview.api){ boot(); return; }
  window.addEventListener("pywebviewready", boot);

  // 브라우저 판정: 짧은 유예 후에도 브릿지가 없으면 더미로 폴백(디자인용).
  setTimeout(function(){
    if(!booted && !(window.pywebview && window.pywebview.api)){
      state.booting=false; renderAll();   // 순수 브라우저 → 더미
      initV3Preview();                    // v3: 더미 로그인 게이트부터 시연
    }
  }, 500);

  // 폴링: 100ms 간격, 늦은 주입도 반드시 잡음. 브라우저면 조용히 종료.
  let tries=0;
  const timer=setInterval(function(){
    if(booted || tries++>100){ clearInterval(timer); return; }
    if(window.pywebview && window.pywebview.api){ clearInterval(timer); boot(); }
  }, 100);
}

/* 위험 동작 무장(armed) 공용: 라벨은 그대로, 버튼만 반딧불처럼 깜박이고
   하단 토스트로 경고. 5초 지나면 원상복귀. 전부 제자리 갱신(리렌더 없음). */
const __armTimers={};
function armFirefly(key,selector,msg){
  state[key]=true;
  document.querySelectorAll(selector).forEach(b=>b.setAttribute("data-armed","1"));
  flash(msg||"한 번 더 누르면 실행됩니다");
  clearTimeout(__armTimers[key]);
  __armTimers[key]=setTimeout(()=>{
    state[key]=(key==="skinDelArmed")?null:false;
    document.querySelectorAll(selector).forEach(b=>b.setAttribute("data-armed","0"));
  },5000);
}
function disarmFirefly(key,selector){
  state[key]=(key==="skinDelArmed")?null:false;
  clearTimeout(__armTimers[key]);
  document.querySelectorAll(selector).forEach(b=>b.setAttribute("data-armed","0"));
}

/* ── UUID 표기 ── */
function hyphenate(u){ u=String(u||""); return u.length===32 ?
  u.slice(0,8)+"-"+u.slice(8,12)+"-"+u.slice(12,16)+"-"+u.slice(16,20)+"-"+u.slice(20) : u; }
function shortUuid(u){ u=String(u||""); return u.length>=12 ? u.slice(0,8)+"…"+u.slice(-4) : u; }

const __gate={poll:null,tick:null};
function stopGateTimers(){

}
function showGate(mode){ state.gate={mode:mode||"idle"}; renderGate(); }

/* 체크박스를 켜야 '동의하고 시작' 이 활성화된다 (형식적 클릭 방지) */
function bindTermsCheckbox(){
  const cb=document.getElementById("terms-agree");
  const btn=document.querySelector('[data-gate="accept"]');
  if(!cb||!btn) return;
  cb.addEventListener("change",()=>{ btn.disabled=!cb.checked; });
}
async function acceptTerms(){
  const cb=document.getElementById("terms-agree");
  if(!cb||!cb.checked) return;
  if(!Bridge.live){ state.gate={mode:"idle"}; renderGate(); return; }

  const btn=document.querySelector('[data-gate="accept"]');
  if(btn) btn.disabled=true;
  try{
    const r=await V3().accept_terms();
    if(!r||!r.ok){
      flash("동의를 저장하지 못했습니다: "+((r&&r.message)||""));
      if(btn) btn.disabled=false;
      return;
    }
  }catch(e){
    flash("동의를 저장하지 못했습니다: "+e);
    if(btn) btn.disabled=false;
    return;
  }
  // 부팅의 나머지를 이어받는다 (bootFromBackend 는 __ngBooted 로 잠겨 있다)
  state.gate={mode:"off"}; renderGate();
  state.booting=true; renderAll();
  try{
    await bootAfterTerms();
  }catch(e){
    // 어떤 이유로든 실패하면 로딩 화면에 갇히지 않게 한다
    state.booting=false; renderAll();
    showGate("idle");
    flash("초기화 중 문제가 발생했습니다: "+e);
  }
}
