function gateAction(k,el){
  if(k==="begin"){ gateBegin(); return; }
  if(k==="add"){ gateBegin(true); return; }   // 계정 추가 = 새 로그인 (다른 계정 안내 표시)
  if(k==="cancel"){ stopGateTimers(); try{ V3().auth_cancel(); }catch(_){}
    (state.auth&&state.auth.logged_in)?showAccountPicker():showGate("idle"); return; }
  if(k==="cancel-select"){ state.gate={mode:"off"}; renderGate(); return; }
  if(k==="use"){ gateUseAccount(el&&el.getAttribute("data-uuid")); return; }
  if(k==="remove"){ gateRemoveAccount(el&&el.getAttribute("data-uuid")); return; }
  if(k==="begincode"){ gateBeginDeviceCode(); return; }
  if(k==="copy"){
    const c=(state.gate&&state.gate.code)||"";
    try{ navigator.clipboard.writeText(c); flash("코드를 복사했습니다: "+c); }catch(_){ flash(c); }
    return;
  }
  if(k==="open"){
    const uri=(state.gate&&state.gate.uri)||"https://microsoft.com/link";
    Promise.resolve(V3().auth_open_verification(uri)).then(r=>{
      flash(Bridge.live?((r&&r.ok)?"로그인 페이지를 엽니다":((r&&r.message)||"열 수 없습니다"))
                       :"이 미리보기에서는 새 창을 열지 않습니다");
    });
    return;
  }
  if(k==="reopen"){
    // 로그인 창이 안 떴을 때 저장된 authorize URL 을 다시 연다.
    const uri=(state.gate&&state.gate.authUrl)||"";
    if(!uri){ flash("로그인 주소가 없습니다. 취소 후 다시 시도해주세요."); return; }
    Promise.resolve(V3().auth_open_verification(uri)).then(r=>{
      flash(Bridge.live?((r&&r.ok)?"브라우저에서 로그인 페이지를 엽니다":((r&&r.message)||"열 수 없습니다"))
                       :"이 미리보기에서는 새 창을 열지 않습니다");
    });
    return;
  }
}
async function gateUseAccount(uuid){
  if(!uuid) return;
  const cur=state.auth&&state.auth.uuid;
  if(uuid===cur){ state.gate={mode:"off"}; renderGate(); return; }
  const r=await V3().auth_switch(uuid);
  if(r&&r.ok){
    state.auth=Object.assign({logged_in:true},r.account||state.auth); state.gate={mode:"off"};
    state.client=null; state.skinLib={used_id:null,items:[]}; state.skinBust=Date.now();
    renderGate();
    await afterLogin();
    renderAcct();   // afterLogin 의 renderAll 이후에 뱃지 확정
    flash((state.auth.username||"")+" 계정으로 전환했습니다");
  }else{ flash((r&&r.message)||"전환에 실패했습니다"); }
}
async function gateRemoveAccount(uuid){
  if(!uuid) return;
  const wasActive=state.auth&&state.auth.uuid===uuid;
  const r=await V3().auth_remove(uuid);
  if(!(r&&r.ok)){ flash((r&&r.message)||"제거에 실패했습니다"); return; }
  flash("계정을 제거했습니다");
  if(wasActive){
    if(r.active){
      const sw=await V3().auth_switch(r.active);
      if(sw&&sw.ok){ state.auth=Object.assign({logged_in:true},sw.account); state.client=null; state.skinLib={used_id:null,items:[]}; await afterLogin(); renderAcct(); }
    }else{
      state.auth={logged_in:false}; renderAcct(); renderAll(); showGate("idle"); return;
    }
  }
  showAccountPicker();   // 목록 새로고침
}
async function gateBegin(adding){
  stopGateTimers();
  state.gate={mode:"busy"}; renderGate();
  try{
    const r=await V3().auth_begin();
    if(!r || !r.ok){ state.gate={mode:"error",message:(r&&r.message)||"로그인을 시작할 수 없습니다."}; renderGate(); return; }
    // 앱 내부 로그인 창(embedded) 또는 외부 브라우저 폴백.
    state.gate={mode:"waiting",adding:!!adding,authUrl:r.auth_url||"",
      embedded:!!r.embedded, deadline:Date.now()+300*1000};
    renderGate(); startGateCountdown(); scheduleGatePoll();
  }catch(e){ state.gate={mode:"error",message:"로그인 시작 오류: "+e}; renderGate(); }
}
/* 대체 로그인 — 인증 코드(device code) 방식 */
async function gateBeginDeviceCode(adding){
  stopGateTimers();
  state.gate={mode:"busy"}; renderGate();
  try{
    const r=await V3().auth_begin_devicecode();
    if(!r || !r.ok){ state.gate={mode:"error",message:(r&&r.message)||"코드 발급에 실패했습니다."}; renderGate(); return; }
    state.gate={mode:"code",adding:!!adding,code:r.user_code,
      uri:r.verification_uri||"https://microsoft.com/link",device:r.device_code,
      intervalMs:Math.max(1,(r.interval||5))*1000,
      deadline:Date.now()+(r.expires_in||900)*1000};
    renderGate(); startGateCountdown(); scheduleGatePoll();
  }catch(e){ state.gate={mode:"error",message:"코드 발급 오류: "+e}; renderGate(); }
}
function gateActive(){ return state.gate && (state.gate.mode==="waiting"||state.gate.mode==="code"); }
function startGateCountdown(){
  const step=()=>{
    if(!gateActive()) return;
    const el=document.getElementById("gate-remain");
    const sLeft=Math.max(0,Math.floor((state.gate.deadline-Date.now())/1000));
    if(el) el.textContent=Math.floor(sLeft/60)+":"+String(sLeft%60).padStart(2,"0");
    if(sLeft<=0){ stopGateTimers(); state.gate={mode:"error",message:"로그인 시간이 만료됐습니다. 다시 시도해주세요."}; renderGate(); }
  };
  step(); __gate.tick=setInterval(step,1000);
}
function scheduleGatePoll(){
  const ms=(state.gate&&state.gate.mode==="code")?(state.gate.intervalMs||5000):2000;
  __gate.poll=setTimeout(gatePollOnce, ms);
}
async function gatePollOnce(){
  if(!gateActive()) return;
  const isCode=(state.gate.mode==="code");
  try{
    const r=await (isCode ? V3().auth_poll(state.gate.device) : V3().auth_poll());
    if(!gateActive()) return;   // 폴링 중 취소됨
    if(r.status==="pending"){ scheduleGatePoll(); return; }
    if(r.status==="slow_down"){ state.gate.intervalMs=(state.gate.intervalMs||5000)+((r.interval_add||5)*1000); scheduleGatePoll(); return; }
    if(r.status==="ok"){
      stopGateTimers();
      state.auth=r.account||{logged_in:true};
      state.gate={mode:"off"}; renderGate(); renderAcct();
      flash((state.auth.username||"")+" 님, 환영합니다!");
      afterLogin();
      return;
    }
    stopGateTimers();
    state.gate={mode:"error",message:r.message||"로그인에 실패했습니다."}; renderGate();
  }catch(e){
    stopGateTimers();
    state.gate={mode:"error",message:"로그인 오류: "+e}; renderGate();
  }
}
async function afterLogin(){
  if(Bridge.live){ await bootMain(); }   // 실백엔드: 남은 부트(점검/카탈로그/스캔) 이어감
  else { renderAll(); refreshClient(); refreshSkinLib(); } // 미리보기: 화면만 갱신
}

function v3LaunchBtnHTML(){

    return '<button class="btn btn--primary btn--lg" disabled style="opacity:.7;cursor:default"><span class="pulse-dot"></span>'+ic("play",22)+'게임 실행 중</button>';

       NN/g: 긴 대기는 '현재 단계'를 알려야 사용자가 시스템이 죽지 않았음을 안다. */
    const p=state.launchPrep;

  if(c&&c.installing)
    return '<button class="btn btn--lg" disabled style="opacity:.65;cursor:default">'+ic("download",20)+'설치 중…</button>';
  if(!c||!c.installed)
    return '<button class="btn btn--primary btn--lg" data-client="install">'+ic("download",22)+'게임 설치</button>';

async function clientInstall(){

  state.client=Object.assign({},state.client||{},{installing:true});
  state.clientPct=0; state.clientMsg="설치 준비 중…";

    flash("설치 오류: "+e); renderScreen(false);

}

/* ── Fabric 로더 업데이트 ─────────────────────────────────────────────
   설정탭 Fabric 행의 버튼 → 백그라운드 갱신 → 진행률을 그 행에 표시. */
function fabricRowSet(html){
  const el=document.querySelector('.ver-status[data-verid="fabric"]');
  if(el) el.innerHTML=html;
}
async function doFabricUpdate(){
  if(state.fabricUpdating) return;
  // 게임 미설치 상태면 로더 업데이트가 아니라 '게임 설치'가 필요하다.
  if(!state.client || !state.client.installed){
    flash("먼저 플레이 탭에서 게임을 설치해주세요");
    return;
  }
  // 게임 실행 중이면 파일이 잠겨 실패하므로 미리 막는다.
  if(state.gameRunning){ flash("마인크래프트를 종료한 뒤 업데이트해주세요"); return; }
  state.fabricUpdating=true;
  fabricRowSet('<span class="badge" data-tone="diamond">0%</span>');
  try{
    const r=await V3().update_fabric_async();
    if(!r || !r.started){
      state.fabricUpdating=false;
      flash((r&&r.message)||"업데이트를 시작할 수 없습니다");
      if(state.nav==="system") renderScreen(false);
    }
  }catch(e){
    state.fabricUpdating=false;
    flash("업데이트 오류: "+e);
    if(state.nav==="system") renderScreen(false);
  }
}
/* ── 실행 전 파일 검증 진행 (백엔드 verify_and_repair) ──────────────────
   mll 이 주는 상태 문자열은 영어라 사용자에게 보일 말로 바꾼다.
   NN/g: 사용자 언어로, 내부 전문용어 금지. */
function prepMsgKo(msg){
  const m=String(msg||"");
  if(m.startsWith("Download ")) return "파일 내려받는 중";
  if(m.indexOf("librar")>=0) return "라이브러리 확인 중";
  if(m.indexOf("asset")>=0 || m.indexOf("Asset")>=0) return "리소스 확인 중";
  if(m.indexOf("java runtime")>=0 || m.indexOf("Java")>=0) return "Java 런타임 준비 중";
  if(m.indexOf("Installation complete")>=0) return "검증 완료";
  if(m.indexOf("검증")>=0 || m.indexOf("복구")>=0) return m;   // 우리가 넣은 한글 메시지
  return "게임 파일 검증 중";
}
/* 실행 버튼만 제자리 갱신 — 검증 진행률은 수백 번 발생하므로
   renderScreen() 전체 재렌더를 쓰면 안 된다. */
function refreshLaunchBtn(){
  const h=document.getElementById("launch-btn-holder");
  if(h) h.innerHTML=v3LaunchBtnHTML();
  else if(state.nav==="play") renderScreen(false);
}
/* ── 설치 진행 표시: 단계 + 실제 파일 수 (퍼센트 억지 추정 대신) ─────────
   NN/g: 정확한 추정이 어려우면 완료/남은 단계를 보여주고 현재 단계를 표시하라.
   또 오래 걸리는 작업에는 반드시 중단 수단을 준다. */
function ciStageText(){
  const d=state.clientDetail;
  if(!d || !d.stage) return "게임 파일 준비 중…";
  const no=d.stage_no||0, tot=d.stage_total||4;
  return d.stage + (no? " ("+no+"/"+tot+" 단계)" : "");
}
function ciCountText(){
  const d=state.clientDetail;
  if(!d || !d.max) return "";
  return (d.cur||0).toLocaleString()+" / "+d.max.toLocaleString()+" 파일";
}
async function doCancelInstall(){
  if(state.clientCancelling) return;
  state.clientCancelling=true;
  if(state.nav==="play") renderScreen(false);
  try{
    const r=await V3().cancel_install();
    if(!r||!r.ok){ state.clientCancelling=false; flash((r&&r.message)||"취소할 수 없습니다"); if(state.nav==="play") renderScreen(false); }
  }catch(e){ state.clientCancelling=false; flash("취소 오류: "+e); }
}

window.onLaunchPrep=function(pct,msg,detail){
  if(pct<0){
    state.launchPrep=null;
    refreshLaunchBtn();
    return;   // 실패 메시지는 doLaunch 의 반환값에서 처리
  }
  // 백엔드가 준 단계 이름이 있으면 그걸 쓴다 (문자열 추측보다 정확)
  const stage=(detail&&detail.stage)?detail.stage+" 확인 중":prepMsgKo(msg);
  state.launchPrep={pct:pct, msg:stage};
  refreshLaunchBtn();
};

window.onFabricUpdate=async function(pct,msg,detail){
  if(pct<0){
    state.fabricUpdating=false;
    flash(msg||"Fabric 업데이트에 실패했습니다");
    if(state.nav==="system") renderScreen(false);
    return;
  }
  // pct 는 단계 내 퍼센트 → 완료는 detail.raw==="done" 으로만 판단
  const done = !!(detail && detail.raw==="done") || (!detail && pct>=100);
  if(!done){
    const label = (detail && detail.stage) ? detail.stage : pct+"%";
    fabricRowSet('<span class="badge" data-tone="diamond">'+esc(label)+'</span>');
    return;
  }
  state.fabricUpdating=false;
  flash(msg||"Fabric 로더를 최신으로 업데이트했습니다");
  await reloadVersions();      // 설정탭 Fabric 행 = 새 버전 + '최신' 뱃지
  refreshClient();             // 새 version_id 반영
  if(state.nav==="system") renderScreen(false);
};

window.onClientInstall=async function(pct,msg,detail){
  if(pct===-2){                       // 사용자 취소
    if(state.client) state.client.installing=false;
    state.clientPct=0; state.clientDetail=null; state.clientCancelling=false;
    flash(msg||"설치를 취소했습니다");
    refreshClient();
    if(state.nav==="play"||state.nav==="system") renderScreen(false);
    return;
  }
  if(pct<0){
    if(state.client) state.client.installing=false;
    state.clientPct=0; state.clientDetail=null; state.clientCancelling=false;
    flash(msg||"설치에 실패했습니다");
    if(state.nav==="play"||state.nav==="system") renderScreen(false);
    return;
  }
  state.clientPct=pct; state.clientMsg=msg||"";
  if(detail && detail.stage) state.clientDetail=detail;
  const bar=document.getElementById("ci-bar");
  if(bar){
    bar.style.width=pct+"%";
    const pc=document.getElementById("ci-pct"); if(pc) pc.textContent=pct+"%";
    const ms=document.getElementById("ci-msg"); if(ms) ms.textContent=ciStageText();
    const sb=document.getElementById("ci-sub"); if(sb) sb.textContent=ciCountText();
  }else if(state.nav==="play"){ renderScreen(false); }
  /* ⚠️ pct 는 '현재 단계 내 퍼센트' 다. 단계마다 100 에 도달하므로
     pct>=100 을 완료로 보면 첫 단계가 끝나자마자 '설치 완료'가 된다.
     완료 신호는 detail.raw === "done" (백엔드가 검증 통과 후에만 보냄). */
  const isDone = !!(detail && detail.raw==="done") || (!detail && pct>=100);
  if(isDone){
    /* 백엔드가 검증(is_version_ready) 후에만 완료를 보내지만,
       한 번 더 실제 상태를 확인하고 나서 '완료'로 표시한다.
       (게임 실행이 가능해지기 전에는 절대 '설치됨' 이라 하지 않는다) */
    let ok=true;
    if(Bridge.live){
      try{
        const st=await Bridge.api.client_status();
        ok = !!(st && st.installed);
        if(ok) state.client=Object.assign({},state.client||{},st,{installing:false});
      }catch(_){ ok=false; }
    }else{
      state.client=Object.assign({},state.client||{},{installing:false,installed:true});
    }
    if(!ok){
      if(state.client) state.client.installing=false;
      flash("설치가 완료되지 않았습니다. 다시 시도해주세요.");
      if(state.nav==="play"||state.nav==="system") renderScreen(false);
      return;
    }
    flash("게임 설치가 완료되었습니다");
    reloadVersions();     // Fabric 로더 버전 '미설치' → 실제 버전으로 스르륵 갱신
    if(state.nav==="play"||state.nav==="system") renderScreen(false);
  }
};

/* ── 할당 메모리 (Allocated memory) ─────────────────────────────────────
   슬라이더로 -Xmx 를 조절. 시스템 총 RAM 기준 상한/권장값을 백엔드가 준다. */
function fmtGB(mb){
  const g = mb/1024;
  return (Number.isInteger(g) ? g : g.toFixed(1)) + " GB";
}
function memCardHTML(){
  const m=state.mem;
  if(!m) return '<div class="tile card-pad">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+ic("sliders-horizontal",16)+'<span class="eyebrow">할당 메모리</span></div>'
    +'<div style="font-size:var(--text-sm);color:var(--text-muted)">불러오는 중…</div></div>';

  const pctPos = ((m.alloc_mb-m.min_mb)/Math.max(m.max_mb-m.min_mb,1))*100;
  const isRec = Math.abs(m.alloc_mb-m.recommended_mb)<256;
  // 총 RAM 의 절반을 넘게 잡으면 시스템이 느려질 수 있음
  const heavy = m.total_mb && m.alloc_mb > m.total_mb*0.55;

  const presets=[2048,4096,6144,8192].filter(v=>v>=m.min_mb&&v<=m.max_mb);
  const chips=presets.map(v=>
    '<button class="mem-chip" data-active="'+(Math.abs(v-m.alloc_mb)<128)+'" data-mem="preset" data-mb="'+v+'">'
    +fmtGB(v)+(v===m.recommended_mb?' <span class="mem-rec">권장</span>':'')+'</button>').join("");

  return '<div class="tile card-pad">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+ic("sliders-horizontal",16)+'<span class="eyebrow">할당 메모리</span></div>'
    +'<div style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:16px">'
      +'마인크래프트가 사용할 최대 메모리입니다. 모드가 많으면 늘리세요.'
      +(m.total_mb?' 이 PC의 전체 메모리는 <b>'+fmtGB(m.total_mb)+'</b> 입니다.':'')
    +'</div>'
    +'<div class="mem-head">'
      +'<span class="mem-val" id="mem-val">'+fmtGB(m.alloc_mb)+'</span>'
      +(isRec?'<span class="badge" data-tone="emerald">'+ic("check",13)+'권장값</span>':'')
    +'</div>'
    +'<div class="mem-slider-wrap">'
      +'<input type="range" id="mem-range" class="mem-range" min="'+m.min_mb+'" max="'+m.max_mb+'" step="512" value="'+m.alloc_mb+'" '
        +'style="--fill:'+pctPos.toFixed(1)+'%">'
      +'<div class="mem-scale"><span>'+fmtGB(m.min_mb)+'</span><span>'+fmtGB(m.max_mb)+'</span></div>'
    +'</div>'
    +'<div class="mem-chips">'+chips+'</div>'
    +(heavy?'<div class="mem-warn">'+ic("shield-alert",14)+'전체 메모리의 절반 이상입니다. 다른 프로그램이 느려질 수 있어요.</div>':'')
    +'</div>';
}
async function loadMemory(){

/* 슬라이더 드래그 중에는 화면만 갱신, 놓을 때 저장 (과도한 IO 방지) */
function memPreview(mb){
  const m=state.mem; if(!m) return;
  m.alloc_mb=mb;
  const v=document.getElementById("mem-val"); if(v) v.textContent=fmtGB(mb);
  const r=document.getElementById("mem-range");
  if(r) r.style.setProperty("--fill", (((mb-m.min_mb)/Math.max(m.max_mb-m.min_mb,1))*100).toFixed(1)+"%");
}
async function memCommit(mb){
  try{
    const r=await V3().set_memory(mb);
    if(r&&r.ok){
      state.mem.alloc_mb=r.alloc_mb;
      flash("할당 메모리를 "+fmtGB(r.alloc_mb)+"로 설정했습니다");
    }else{ flash((r&&r.message)||"메모리 설정에 실패했습니다"); }
  }catch(e){ flash("메모리 설정 오류: "+e); }
  if(state.nav==="system") renderScreen(false);   // 권장/경고 뱃지 갱신
}

/* ── 스킨 탭: 라이브러리 (공식 런처 레이아웃 · Nether Glass 재해석) ── */
function skinRenderURL(kind){
  const a=state.auth||{};
  // 실계정은 본인 UUID. 더미(미리보기)만 MHF_Steve 로 대체.
  const dummy=(a.uuid==="a1b2c3d4e5f60718293a4b5c6d7e8f90"||!a.uuid);

/* 3D 뷰어에 넣을 raw 스킨 텍스처(64x64 PNG) URL. */
function skinTextureURL(){
  const a=state.auth||{};
  const dummy=(a.uuid==="a1b2c3d4e5f60718293a4b5c6d7e8f90"||!a.uuid);
  if(dummy) return "https://mc-heads.net/skin/MHF_Steve?b="+(state.skinBust||0);
  // 실계정: skin_get 이 준 Mojang 공식 텍스처 URL 우선 (textures.minecraft.net,
  // CORS 허용 + 실제 현재 스킨). 없으면 mc-heads 폴백.
  if(state.skin && state.skin.url) return state.skin.url;
  return "https://mc-heads.net/skin/"+a.uuid+"?b="+(state.skinBust||0);
}
/* 스킨 텍스처(64x64/64x32 data_url)에서 전신을 CSS 레이어로 합성.
   variant="slim" 이면 팔 너비 3px, 아니면 4px.
   대각선(3/4) 뷰: 살짝 Y축 회전 + 원근으로 공식 런처 느낌을 낸다. */
function skinLayer(dataUrl,sc,sx,sy,dx,dy,w,h){
  return '<span style="position:absolute;left:'+(dx*sc)+'px;top:'+(dy*sc)+'px;width:'+(w*sc)+'px;height:'+(h*sc)+'px;'
    +'background-image:url('+dataUrl+');background-repeat:no-repeat;'
    +'background-size:'+(64*sc)+'px '+(64*sc)+'px;background-position:-'+(sx*sc)+'px -'+(sy*sc)+'px;image-rendering:pixelated"></span>';
}
function skinBodyHTML(dataUrl,height,variant){
  const slim=variant==="slim";
  const aw=slim?3:4;                 // 팔 너비 (슬림 3 / 와이드 4)
  const bodyW=8, W=aw*2+bodyW;       // 논리 캔버스 가로 (팔+몸+팔)
  const sc=height/32;
  if(!dataUrl) return '<span style="display:inline-block;width:'+(W*sc)+'px;height:'+height+'px;border-radius:6px;background:var(--glass-fill)"></span>';
  const L=(sx,sy,dx,dy,w,h)=>skinLayer(dataUrl,sc,sx,sy,dx,dy,w,h);
  // 팔 텍스처 폭도 variant 에 맞춤: 슬림은 텍스처 상 3px 영역
  const RA_x=44, LA_x=36;            // 오른팔/왼팔(모던) u 좌표
  const inner='<span style="position:relative;display:inline-block;width:'+(W*sc)+'px;height:'+height+'px">'
    /* 기본 레이어 */
    +L(8,8,aw,0,8,8)                          /* 머리 */
    +L(20,20,aw,8,8,12)                       /* 몸통 */
    +L(RA_x,20,aw+bodyW,8,aw,12)              /* 오른팔 */
    +L(LA_x,52,0,8,aw,12)                     /* 왼팔(모던) */
    +L(4,20,aw,20,4,12)                       /* 오른다리 */
    +L(20,52,aw+4,20,4,12)                    /* 왼다리(모던) */
    /* 오버레이(머리카락·자켓 등) */
    +L(40,8,aw,0,8,8)+L(20,36,aw,8,8,12)+L(RA_x,36,aw+bodyW,8,aw,12)
    +L(52,52,0,8,aw,12)+L(4,36,aw,20,4,12)+L(4,52,aw+4,20,4,12)
  +'</span>';
  // 정면 단순 렌더 (대각선/3D 없음 — CSS 한계로 찌그러짐 방지, 추후 3D 엔진으로 교체 예정)
  return '<span style="position:relative;display:inline-block;width:'+(W*sc)+'px;height:'+height+'px;flex:0 0 auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35))">'+inner+'</span>';
}
function skinFaceHTML(dataUrl,size){
  if(!dataUrl) return '<span class="acct-ava" style="width:'+size+'px;height:'+size+'px;border-radius:8px"><span class="acct-init" style="font-size:'+Math.round(size*.4)+'px">?</span></span>';
  const sc=size/8;
  return '<span style="position:relative;display:inline-block;width:'+size+'px;height:'+size+'px;border-radius:8px;overflow:hidden;flex:0 0 auto;background:var(--glass-fill)">'
    +skinLayer(dataUrl,sc,8,8,0,0,8,8)+skinLayer(dataUrl,sc,40,8,0,0,8,8)+'</span>';
}
/* 망토 텍스처(64x32)에서 정면(1,1,10,16) 크롭 */
function capeFrontHTML(url,height){
  const sc=height/16, W=10*sc;
  if(!url) return '<span style="display:inline-block;width:'+W+'px;height:'+height+'px;border-radius:4px;background:var(--glass-fill);border:1px dashed var(--glass-edge)"></span>';
  return '<span style="position:relative;display:inline-block;width:'+W+'px;height:'+height+'px;border-radius:4px;overflow:hidden">'
    +'<span style="position:absolute;inset:0;background-image:url('+url+');background-repeat:no-repeat;'
    +'background-size:'+(64*sc)+'px '+(32*sc)+'px;background-position:-'+(1*sc)+'px -'+(1*sc)+'px;image-rendering:pixelated"></span></span>';
}

/* 메뉴 열고 닫기 — 화면 리렌더 없이 홀더만 갱신 (껌벅임 방지) */
function toggleSkinMenu(sid){
  const prev=state.skinMenu;
  if(prev && prev!==sid){
    const h=document.getElementById("skmenu-"+prev); if(h)h.innerHTML="";
    const pc=document.getElementById("skcard-"+prev); if(pc)pc.classList.remove("skin-card--menuopen");
  }
  if(prev===sid){
    state.skinMenu=null;
    const h=document.getElementById("skmenu-"+sid); if(h)h.innerHTML="";
    const c=document.getElementById("skcard-"+sid); if(c)c.classList.remove("skin-card--menuopen");
  }else{
    state.skinMenu=sid;
    const h=document.getElementById("skmenu-"+sid);
    if(h)h.innerHTML=skinMenuHTML(sid,state.skinDelArmed===sid);
    const c=document.getElementById("skcard-"+sid); if(c)c.classList.add("skin-card--menuopen");

}

/* ── 스킨 모달 (추가/수정 공용, 공식 레이아웃: 좌 미리보기 / 우 필드) ── */
function updateSkinModalPreview(){

  const prev=document.getElementById("skinm-preview");
  if(prev) prev.innerHTML = dataUrl?skinThumbHTML({data_url:dataUrl,variant:m.variant,id:"__modal"}):'<span style="font-size:var(--text-xs);color:var(--text-faint);text-align:center;line-height:1.6">파일을 선택하면<br>미리보기가 표시돼요</span>';
  const fileLabel=m.file?m.file.filename:(m.mode==="edit"?"기존 파일 유지":"64x64 PNG · 24KB 이하");

  if(lbl){ lbl.textContent=fileLabel; lbl.setAttribute("title",fileLabel); }

  document.querySelectorAll('[data-skinm="save"],[data-skinm="saveuse"]').forEach(b=>{
    if(canSave&&!state.skinBusy){ b.removeAttribute("disabled"); b.style.opacity=""; }
    else { b.setAttribute("disabled",""); b.style.opacity=".55"; }
  });
}

        +'<div style="display:flex;flex-direction:column;gap:16px">'

            +'style="width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--glass-edge);background:var(--glass-fill);color:var(--text-strong);font-size:var(--text-sm);outline:none"/></div>'
          +'<div><div class="eyebrow" style="margin-bottom:6px">플레이어 모델</div><div style="display:flex;gap:6px">'+seg("classic","와이드")+seg("slim","슬림")+'</div></div>'
          +'<div><div class="eyebrow" style="margin-bottom:6px">스킨 파일</div>'
            +'<div style="display:flex;align-items:center;gap:10px;min-width:0"><button class="btn btn--sm" data-skinm="pick" style="flex:0 0 auto;white-space:nowrap">'+ic("folder-open",15)+'찾아보기</button>'
            +'<span id="skinm-filelabel" class="mono" style="font-size:var(--text-2xs);color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0" title="'+esc(fileLabel)+'">'+esc(fileLabel)+'</span></div></div>'

      +'<button class="btn btn--primary" data-skinm="saveuse"'+(canSave&&!state.skinBusy?'':' disabled style="opacity:.55"')+'>'+(state.skinBusy?"처리 중…":"저장하고 사용")+'</button></div></div>'

async function skinModalOpen(mode,sid){
  if(mode==="edit"){
    const it=(state.skinLib.items||[]).find(x=>x.id===sid); if(!it)return;
    state.skinModal={mode:"edit",id:sid,name:it.name,variant:it.variant,cape_id:it.cape_id||"",data_url:it.data_url,file:null};
  }else{
    state.skinModal={mode:"add",name:"",variant:"classic",cape_id:"",file:null};
  }
  renderSkinModal();  // 즉시 표시
  // capes 가 없거나 비어있으면 로드 후 재렌더 (프리로드 성공 시엔 이 경로 스킵)
  if(!state.skinCapes || state.skinCapes.length===0){
    try{ const r=await V3().skin_capes(); if(r&&r.ok&&state.skinModal){ state.skinCapes=r.capes||[]; renderSkinModal(); } }catch(_){}
  }
}
function skinModalCollect(){
  const m=state.skinModal; if(!m)return null;
  const nameEl=document.getElementById("skinm-name");
  m.name=nameEl?nameEl.value.trim():m.name;
  const cape=(state.skinCapes||[]).find(c=>c.id===m.cape_id);
  m.cape_name=cape?cape.name:null;
  return m;
}
async function skinModalAction(k,el){
  if(k==="close"){ state.skinModal=null; renderSkinModal(); return; }
  if(k==="cape"){
    skinModalCollect(); state.skinModal.cape_id=el.getAttribute("data-cape")||"";
    document.querySelectorAll(".cape-opt").forEach(b=>b.classList.toggle("cape-opt--sel",b===el));
    return;
  }
  if(k.indexOf("variant-")===0){
    skinModalCollect(); state.skinModal.variant=k.slice(8);
    document.querySelectorAll('[data-skinm^="variant-"]').forEach(b=>
      b.setAttribute("data-active",String(b.getAttribute("data-skinm")==="variant-"+state.skinModal.variant)));
    updateSkinModalPreview();
    return;
  }
  if(k==="pick"){
    skinModalCollect();
    const r=await V3().skin_pick_file();
    if(!state.skinModal) return;
    if(r&&r.ok){ state.skinModal.file={path:r.path,data_url:r.data_url,filename:r.filename}; updateSkinModalPreview(); }
    else if(r&&r.code!=="cancelled"){ flash((r&&r.message)||"파일을 불러올 수 없습니다"); }
    return;
  }
  if(k==="save"||k==="saveuse"){
    const m=skinModalCollect();
    if(!m||state.skinBusy) return;
    if(m.mode==="add"&&!m.file){ flash("스킨 파일을 먼저 선택해주세요"); return; }
    state.skinBusy=true; renderSkinModal();
    try{
      let sid=m.id,r;
      if(m.mode==="add"){
        r=await V3().skin_lib_add(m.name,m.variant,m.cape_id||null,m.cape_name||null,m.file.path);
        if(!(r&&r.ok)) throw (r&&r.message)||"저장에 실패했습니다";
        sid=r.id;
      }else{
        r=await V3().skin_lib_update(m.id,m.name,m.variant,m.cape_id||null,m.cape_name||null,m.file?m.file.path:null);
        if(!(r&&r.ok)) throw (r&&r.message)||"저장에 실패했습니다";
      }
      if(k==="saveuse"){
        const u=await V3().skin_lib_use(sid);
        if(u&&u.ok){ flash("스킨을 적용했습니다 — 반영까지 몇 분 걸릴 수 있어요"+(u.warning?(" ("+u.warning+")"):"")); state.skinBust=Date.now(); }
        else if(u&&u.code==="relogin"){ state.skinBusy=false; state.skinModal=null; renderSkinModal(); state.auth={logged_in:false}; renderAcct(); renderAll(); showGate("idle"); flash("로그인이 만료됐습니다. 다시 로그인해주세요."); return; }
        else{ flash((u&&u.message)||"적용에 실패했습니다"); }
      }else{
        flash(m.mode==="add"?"라이브러리에 저장했습니다":"수정했습니다");
      }
      state.skinBusy=false; state.skinModal=null; renderSkinModal();
      await refreshSkinLib();
    }catch(e){
      state.skinBusy=false; renderSkinModal();
      flash(typeof e==="string"?e:("저장 오류: "+e));
    }
    return;
  }
}
async function refreshSkinLib(){
  try{
    const r=await V3().skin_lib_list();
    if(r&&r.ok){ state.skinLib=r; }
    // 현재 적용된 스킨 정보(variant) — 3D 뷰어가 슬림/와이드 정확히 렌더하도록
    try{ const g=await V3().skin_get(); if(g&&g.ok) state.skin=g; }catch(_){}
    // 망토 목록 미리 로드 → 모달 열 때 재렌더(껌벅) 방지
    if(!state.skinCapes){ try{ const c=await V3().skin_capes(); if(c&&c.ok) state.skinCapes=c.capes||[]; }catch(_){} }
    if(state.nav==="skin") renderScreen(false);
  }catch(_){}
}
async function skinAction(k,sid){
  if(k!=="del"&&state.skinDelArmed) disarmFirefly("skinDelArmed",'.skin-menu [data-skin="del"]');
  if(k!=="reset"&&state.skinResetArmed) disarmFirefly("skinResetArmed",'[data-skin="reset"]');
  if(k==="menu"){ toggleSkinMenu(sid); return; }
  if(k==="add"){ state.skinMenu=null; skinModalOpen("add"); return; }
  if(k==="edit"){ state.skinMenu=null; skinModalOpen("edit",sid); return; }
  if(k==="refresh"){ state.skinMenu=null; state.skinBust=Date.now(); refreshSkinLib(); flash("스킨 정보를 새로고침했습니다"); return; }
  if(k==="dup"){
    state.skinMenu=null;
    const r=await V3().skin_lib_duplicate(sid);
    if(r&&r.ok) flash("복제했습니다"); else flash((r&&r.message)||"복제에 실패했습니다");
    refreshSkinLib(); return;
  }
  if(k==="del"){
    state.skinMenu=null;
    const r=await V3().skin_lib_delete(sid);
    if(r&&r.ok) flash("삭제했습니다"); else flash((r&&r.message)||"삭제에 실패했습니다");
    refreshSkinLib(); return;
  }
  if(state.skinBusy) return;
  if(k==="use"){
    state.skinMenu=null; state.skinBusy=true;
    /* 제자리 비활성화 — 화면 리렌더 없이 (껌벅임 방지) */
    document.querySelectorAll('[data-skin="use"]').forEach(b=>b.setAttribute("disabled",""));
    const r=await V3().skin_lib_use(sid);
    state.skinBusy=false;
    if(r&&r.ok){ flash("스킨을 적용했습니다 — 반영까지 몇 분 걸릴 수 있어요"+(r.warning?(" ("+r.warning+")"):"")); state.skinBust=Date.now(); }
    else if(r&&r.code==="relogin"){ state.auth={logged_in:false}; renderAcct(); renderAll(); showGate("idle"); flash("로그인이 만료됐습니다. 다시 로그인해주세요."); return; }
    else{ flash((r&&r.message)||"적용에 실패했습니다"); }
    refreshSkinLib(); return;
  }
  if(k==="reset"){
    if(!state.skinResetArmed){ armFirefly("skinResetArmed",'[data-skin="reset"]',"한 번 더 누르면 기본 스킨으로 초기화됩니다"); return; }
    disarmFirefly("skinResetArmed",'[data-skin="reset"]'); state.skinBusy=true;
    const r=await V3().skin_reset();
    state.skinBusy=false;
    if(r&&r.ok){ flash("기본 스킨으로 초기화했습니다"); state.skinBust=Date.now(); }
    else{ flash((r&&r.message)||"초기화에 실패했습니다"); }
    renderScreen(false); return;
  }
}
/* 브라우저 미리보기 초기화: 더미 로그인 게이트부터 시작 */
async function initV3Preview(){
  try{
    const a=await V3().auth_status();
    state.auth=a||{logged_in:false};
    renderAcct();
    if(!state.auth.logged_in) showGate("idle");
    refreshClient();
  }catch(_){}
}

initApp();
</script>
